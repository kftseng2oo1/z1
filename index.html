function initDateSelects() {
    const ySel = document.getElementById('solarYear');
    const mSel = document.getElementById('solarMonth');
    const dSel = document.getElementById('solarDay');

    for (let i = 1924; i <= 2043; i++) {
        ySel.options.add(new Option(i + ' 年', i));
    }
    ySel.value = 1966;

    for (let i = 1; i <= 12; i++) {
        mSel.options.add(new Option(i + ' 月', i));
    }
    mSel.value = 12;

    function updateDays() {
        const y = parseInt(ySel.value);
        const m = parseInt(mSel.value);
        const daysInMonth = new Date(y, m, 0).getDate();
        const currentDay = parseInt(dSel.value) || 1;
        dSel.innerHTML = '';
        for (let i = 1; i <= daysInMonth; i++) {
            dSel.options.add(new Option(i + ' 日', i));
        }
        dSel.value = currentDay > daysInMonth ? daysInMonth : currentDay;
    }

    ySel.addEventListener('change', updateDays);
    mSel.addEventListener('change', updateDays);
    updateDays();
    dSel.value = 1;
}

function runChart() {
    const solarY = parseInt(document.getElementById('solarYear').value);
    const solarM = parseInt(document.getElementById('solarMonth').value);
    const solarD = parseInt(document.getElementById('solarDay').value);
    const hr = parseInt(document.getElementById('birthHour').value);
    const gd = document.getElementById('gender').value;
    const fy = parseInt(document.getElementById('flowYear').value);

    // 國曆→農曆轉換
    const lunar = solarToLunar(solarY, solarM, solarD);
    lastLunar = { ...lunar, solarY, solarM, solarD };

    chartData = calculateChart(lunar.year, lunar.month, lunar.day, hr, gd, lunar.isLeap ? 1 : 0);

    // Derive flow year 天干
    flowYearGan = getFlowYearGan(fy);

    // Compute current age (虛歲 = 流年 - 出生農曆年 + 1)
    currentAge = fy - lunar.year + 1;
    if (currentAge < 1) currentAge = 1;

    // Find current daxian
    currentDaxian = getCurrentDaxian(chartData.daxianList, currentAge);

    selectedFly = document.getElementById('flySource').value;

    renderGrid();
    buildFlySelector();
    renderReport();
    updateBirthInfo();
}

        '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
        '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    const hourNames = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const hr = parseInt(document.getElementById('birthHour').value);
    const fy = parseInt(document.getElementById('flowYear').value);
    const juName = JU_NAMES_CORRECT[d.juNum] || `${d.juNum}局`;

function renderGrid() {
    const chart = document.getElementById('chartArea');
    chart.innerHTML = '';
    const palaces = chartData.palaces;
    const bGan = chartData.yearGan;
    const yGan = flowYearGan;
    const bSh = SIHUA[bGan];
    const ySh = SIHUA[yGan];

    // Determine highlights
    const hl = getHighlights(palaces, bGan, yGan);

    GRID_ORDER.forEach((dzIdx, i) => {
        const div = document.createElement('div');

        if (dzIdx === -1) {
            // Center box
            div.className = 'center-box';
            div.style.gridColumn = '2/4';
            div.style.gridRow = '2/4';
            renderCenter(div, palaces, bGan, yGan);
            chart.appendChild(div);
            return;
        }
        if (dzIdx < -1) return; // skip

        const palace = palaceByDz(palaces, dzIdx);
        if (!palace) {
            div.className = 'palace';
            div.innerHTML = `<div class="dz-tag">${DI_ZHI[dzIdx]}</div><div class="p-name">（空）</div>`;
            chart.appendChild(div);
            return;
        }

        div.className = 'palace';
        if (palace.isMing) div.classList.add('is-ming');
        if (currentDaxian && palace.name === currentDaxian.palaceName) div.classList.add('is-daxian');
        if (hl.source === palace.name) div.classList.add('hl-source');
        if (hl.luTargets.includes(palace.name)) div.classList.add('hl-lu');
        if (hl.jiTargets.includes(palace.name)) div.classList.add('hl-ji');

        // Gan tag
        let ganHtml = `<div class="gan-tag">${palace.gan}</div>`;

        // Body/Shen indicator
        let bodyHtml = '';
        if (palace.isShen) bodyHtml = `<div class="body-tag">身</div>`;
        if (palace.daxian) bodyHtml += `<div class="body-tag" style="top:${palace.isShen ? 18 : 6}px;color:#b8860b;font-size:10px;">${palace.daxian}</div>`;

        // Stars
        const starArea = document.createElement('div');
        starArea.className = 'star-area';

        // Main stars
        palace.stars.m.forEach(s => {
            const el = document.createElement('div');
            el.className = 'star-item main';
            let html = s;
            for (const k of SH_KEYS) {
                if (bSh[k] === s) html += `<span class="sh-tag sh-${SH_CLS[k]}">生${k}</span>`;
                if (ySh[k] === s) html += `<span class="sh-tag sh-${SH_CLS[k]}">流${k}</span>`;
            }
            el.innerHTML = html;
            starArea.appendChild(el);
        });

        // Assist stars
        palace.stars.a.forEach(s => {
            const el = document.createElement('div');
            el.className = 'star-item assist';
            let html = s;
            for (const k of SH_KEYS) {
                if (bSh[k] === s) html += `<span class="sh-tag sh-${SH_CLS[k]}">生${k}</span>`;
                if (ySh[k] === s) html += `<span class="sh-tag sh-${SH_CLS[k]}">流${k}</span>`;
            }
            el.innerHTML = html;
            starArea.appendChild(el);
        });

        // Malefic stars
        palace.stars.b.forEach(s => {
            const el = document.createElement('div');
            el.className = 'star-item malefic';
            el.textContent = s;
            starArea.appendChild(el);
        });

        div.innerHTML = ganHtml + bodyHtml;
        div.appendChild(starArea);

        // Fly indicators
        const flyInds = document.createElement('div');
        flyInds.className = 'fly-indicators';
        getIncoming(palace, palaces, bGan, yGan).forEach(tag => flyInds.appendChild(tag));
        div.appendChild(flyInds);

        // Self-transform
        const st = detectSelfTrans(palace);
        if (st.length) {
            const stDiv = document.createElement('div');
            stDiv.className = 'self-trans';
            stDiv.innerHTML = st.map(s => `⟳${s.star}自化${s.type}`).join('<br>');
            div.appendChild(stDiv);
        }

        div.innerHTML += `<div class="dz-tag">${palace.dz}</div><div class="p-name">${palace.name}</div>`;
        chart.appendChild(div);
    });
}

function getHighlights(palaces, bGan, yGan) {
    const h = { source: '', luTargets: [], jiTargets: [], isDaxianPalace: false };
    if (!selectedFly) return h;

    let flyData = null;
    if (selectedFly === '生年') {
        flyData = computeFly(palaces, bGan);
    } else if (selectedFly === '大限' && currentDaxian) {
        flyData = computeFly(palaces, currentDaxian.gan);
        h.source = currentDaxian.palaceName;
    } else if (selectedFly === '流年') {
        flyData = computeFly(palaces, yGan);
    } else {
        h.source = selectedFly;
        const sp = palaces.find(p => p.name === selectedFly);
        if (sp) flyData = computeFly(palaces, sp.gan);
    }
    if (flyData) {
        if (flyData.祿) h.luTargets.push(flyData.祿.targetPalace);
        if (flyData.忌) h.jiTargets.push(flyData.忌.targetPalace);
    }
    return h;
}

function getIncoming(palace, palaces, bGan, yGan) {
    const tags = [];
    if (!selectedFly) return tags;

    let flyData = null;
    let label = '';
    if (selectedFly === '生年') {
        flyData = computeFly(palaces, bGan); label = '生年';
    } else if (selectedFly === '大限' && currentDaxian) {
        flyData = computeFly(palaces, currentDaxian.gan); label = '大限';
    } else if (selectedFly === '流年') {
        flyData = computeFly(palaces, yGan); label = '流年';
    } else {
        const sp = palaces.find(p => p.name === selectedFly);
        if (sp) { flyData = computeFly(palaces, sp.gan); label = sp.name; }
    }
    if (!flyData) return tags;

    for (const k of SH_KEYS) {
        if (flyData[k].targetPalace === palace.name) {
            const el = document.createElement('div');
            const isBYD = (selectedFly === '生年' || selectedFly === '流年' || selectedFly === '大限');
            el.className = `fly-ind ${isBYD ? 'birth' : 'year'} ${SH_CLS[k]}-ind`;
            el.textContent = `${label}${k}→${flyData[k].star}`;
            tags.push(el);
        }
    }
    return tags;
}

function renderCenter(div, palaces, bGan, yGan) {
    const bFly = computeFly(palaces, bGan);
    const yFly = computeFly(palaces, yGan);

    let html = '<strong>生年四化（體）：</strong><br>';
    for (const k of SH_KEYS) html += `　${k}：${bFly[k].star}→<b>${bFly[k].targetPalace}</b><br>`;

    // 大限四化
    if (currentDaxian) {
        const dxFly = computeFly(palaces, currentDaxian.gan);
        html += `<br><strong>大限四化（用）── ${currentDaxian.palaceName}（${currentDaxian.gan}干・${currentDaxian.startAge}-${currentDaxian.endAge}歲）：</strong><br>`;
        for (const k of SH_KEYS) html += `　${k}：${dxFly[k].star}→<b>${dxFly[k].targetPalace}</b><br>`;
    }

    html += `<br><strong>流年四化（出）── ${flowYearGan}年：</strong><br>`;
    for (const k of SH_KEYS) html += `　${k}：${yFly[k].star}→<b>${yFly[k].targetPalace}</b><br>`;

    html += '<br><strong>自化偵測：</strong><br>';
    let hasSelf = false;
    palaces.forEach(p => {
        const st = detectSelfTrans(p);
        if (st.length) { hasSelf = true; st.forEach(s => html += `　${p.name}：${s.star}自化${s.type}<br>`); }
    });
    if (!hasSelf) html += '　（無自化）<br>';

    const juName = JU_NAMES_CORRECT[chartData.juNum] || '';
    const nayinKey2 = chartData.mingGan + DI_ZHI[chartData.mingDzIdx];
    const nayinName2 = NAYIN_NAMES[nayinKey2] || '';
    div.innerHTML = `
        <h2>${chartData.yearGan}${chartData.yearZhi}年生</h2>
        <div class="info">命宮${chartData.mingGan}${DI_ZHI[chartData.mingDzIdx]}（${nayinName2}）　${juName}　紫微在${DI_ZHI[chartData.ziweiDzIdx]}</div>
        <div class="fly-summary">${html}</div>
    `;
}

function buildFlySelector() {
    const sel = document.getElementById('flySource');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全盤總覽</option><option value="生年">生年四化（體）</option>';
    if (currentDaxian) {
        sel.innerHTML += `<option value="大限">大限四化（用）── ${currentDaxian.palaceName}（${currentDaxian.gan}干）</option>`;
    }
    sel.innerHTML += `<option value="流年">流年四化（出）── ${flowYearGan}年</option>`;
    chartData.palaces.forEach(p => {
        sel.innerHTML += `<option value="${p.name}">${p.name}（${p.gan}干）</option>`;
    });
    sel.value = cur || '';

    const btns = document.getElementById('flyBtns');
    btns.innerHTML = '';
    const topBtns = ['生年'];
    if (currentDaxian) topBtns.push('大限');
    topBtns.push('流年');
    [...topBtns, ...chartData.palaces.map(p => p.name)].forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'fly-btn' + (selectedFly === s ? ' active' : '');
        const pd = chartData.palaces.find(p => p.name === s);
        if (s === '大限' && currentDaxian) {
            btn.textContent = `大限（${currentDaxian.gan}・${currentDaxian.startAge}-${currentDaxian.endAge}）`;
        } else if (s === '流年') {
            btn.textContent = `流年（${flowYearGan}）`;
        } else {
            btn.textContent = pd ? `${s}（${pd.gan}）` : s;
        }
        btn.onclick = () => {
            selectedFly = s;
            document.getElementById('flySource').value = s;
            renderGrid();
            buildFlySelector();
        };
        btns.appendChild(btn);
    });
}

function getStarInfo(starName) {
    return STAR_DB[starName] || null;
}

/** 取得性別對應的 organs 描述 */
function getOrgans(starName, gender) {
    const info = STAR_DB[starName];
    if (!info) return '';
    if (typeof info.organs === 'string') return info.organs;
    return info.organs[gender] || info.organs['M'] || '';
}

/** 取得性別對應的 health_ji 描述 */
function getHealthJi(starName, gender) {
    const info = STAR_DB[starName];
    if (!info) return '';
    if (typeof info.health_ji === 'string') return info.health_ji;
    return info.health_ji[gender] || info.health_ji['M'] || '';
}

function getDualCombo(stars) {
    if (stars.length < 2) return null;
    // Try all pairs
    for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
            const key1 = stars[i] + ',' + stars[j];
            const key2 = stars[j] + ',' + stars[i];
            if (DUAL_STAR_COMBOS[key1]) return DUAL_STAR_COMBOS[key1];
            if (DUAL_STAR_COMBOS[key2]) return DUAL_STAR_COMBOS[key2];
        }
    }
    return null;
}

function getStarTransformations(starName, bSh, ySh) {
    const results = [];
    for (const k of SH_KEYS) {
        if (bSh[k] === starName) results.push('生' + k);
        if (ySh[k] === starName) results.push('流' + k);
    }
    return results;
}

function hasMaleficInPalace(palace) {
    const heavySha = ['擎羊', '陀羅', '火星', '鈴星', '地空', '地劫'];
    return palace.stars.b.filter(s => heavySha.includes(s));
}

function analyzeStarInPalace(palace, bSh, ySh) {
    // Build detailed analysis of stars in a palace
    const lines = [];
    const mainStars = palace.stars.m;

    mainStars.forEach(s => {
        const info = getStarInfo(s);
        if (!info) return;
        const trans = getStarTransformations(s, bSh, ySh);
        if (trans.length > 0) {
            trans.forEach(t => {
                if (t.includes('忌')) {
                    const _g = (typeof chartData !== 'undefined' && chartData.gender) ? chartData.gender : 'M';
                    lines.push(`<b style="color:var(--quan)">⚠ ${s}${t}</b>：${t.includes('生') ? getHealthJi(s, _g) : '今年需注意' + getOrgans(s, _g) + '相關問題。'}`);
                } else if (t.includes('祿')) {
                    lines.push(`✦ ${s}${t}：${info.personality.substring(0, 20)}⋯能量暢旺。`);
                }
            });
        }
    });
    return lines;
}

        // ── 流月行動曆（動態斗君版）──

        // chartData.lunarMonth = 出生農曆月（1–12），chartData.hourIdx = 時辰索引（0–11）

function buildCross(palaces) {
    const lines = [];
    const keys = ['命宮','財帛宮','官祿宮','夫妻宮','福德宮','田宅宮'];
    keys.forEach(name => {
        const p = palaces.find(pp => pp.name === name);
        if (!p) return;
        const fly = computeFly(palaces, p.gan);
        keys.forEach(target => {
            if (target === name) return;
            if (fly.祿.targetPalace === target) lines.push(`${name}（${p.gan}）飛<b style="color:var(--lu)">祿</b>入${target}`);
            if (fly.忌.targetPalace === target) lines.push(`${name}（${p.gan}）飛<b style="color:var(--ji)">忌</b>入${target}`);
        });
    });
    return lines.length ? lines.join('<br>') : '（此格局六大宮間無直接互飛）';
}

};

function zepHuaClass(t){ return {'祿':'zep-lu','忌':'zep-ji','權':'zep-quan','科':'zep-ke'}[t]||''; }

function zepRelTag(s, t) {
    const sI = ZEP_INNER.includes(s), tI = ZEP_INNER.includes(t);
    if(sI&&tI)  return `<em class="zep-tag-in">【內入內】</em>資源回流・主吉`;
    if(sI&&!tI) return `<em class="zep-tag-out">【內入外】</em>能量外流・主耗`;
    if(!sI&&tI) return `<em class="zep-tag-in">【外入內】</em>獲外援挹注`;
    return `<em class="zep-tag-neu">【外入外】</em>社交變動`;
}

// 使用原系統 computeFly 包裝成插件格式
function zepFly(palaces, gan) {
    const raw = computeFly(palaces, gan);
    if (!raw) return {};
    // raw[k] = { star, targetPalace(name), targetDz }
    // 補上 targetPalaceObj 方便碰撞分析
    const result = {};
    for (const k in raw) {
        const r = raw[k];
        result[k] = {
            star: r.star,
            targetName: r.targetPalace,
            targetPalace: palaces.find(p => p.name === r.targetPalace) || null
        };
    }
    return result;
}

function zepCollision(targetPalace, incomingStar, incomingType, birthGan) {
    if (!targetPalace) return [];
    const cols = [];
    const all = [...(targetPalace.stars?.m||[]),...(targetPalace.stars?.a||[]),...(targetPalace.stars?.b||[])];
    const bsh = SIHUA[birthGan] || {};
    all.forEach(star => {
        const et = Object.keys(bsh).find(k => bsh[k] === star);
        if (!et) return;
        if (et === incomingType) {
            if (et === '忌') cols.push({cls:'zep-collision',html:`⚠ <b class="zep-ji">雙忌疊沖</b>：生年忌(${star}) ＋ 飛入忌(${incomingStar}) 同聚【${targetPalace.name}】，糾纏破耗加倍，壓力極重。`});
            else if (et === '祿') cols.push({cls:'zep-collision dlu',html:`✦ <b class="zep-lu">雙祿交流</b>：生年祿(${star}) ＋ 飛入祿(${incomingStar}) 同聚【${targetPalace.name}】，能量倍增，意外之喜。`});
        } else if ((et==='祿'&&incomingType==='忌')||(et==='忌'&&incomingType==='祿')) {
            cols.push({cls:'zep-collision',html:`↔ <b class="zep-ji">祿忌相戰</b>：生年${et}(${star}) 與飛入${incomingType}(${incomingStar}) 對沖，吉凶互抵、反覆不定。`});
        }
    });
    return cols;
}

// 呼叫 API（共用，支援對話歷史）
async function callAI(userMsg) {
    aiChatMessages.push({ role:'user', content: userMsg });
    const isArtifacts = location.hostname.includes('claude.ai') || location.hostname==='localhost';
    const apiUrl = isArtifacts ? 'https://api.anthropic.com/v1/messages' : ZIWEI_WORKER_URL;
    const body = {
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: aiSystemPrompt,
        messages: aiChatMessages,
    };
    const resp = await fetch(apiUrl, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    const data = await resp.json();
    const reply = data?.content?.[0]?.text || '⚠ 回應異常，請重試。';
    aiChatMessages.push({ role:'assistant', content: reply });
    return reply;
}

// 加入對話泡泡
function addBubble(role, text) {
    const history = document.getElementById('aiChatHistory');
    const div = document.createElement('div');
    div.className = role==='user' ? 'ai-bubble-user' : 'ai-bubble-ai';
    div.textContent = role==='user' ? '你：' + text : '🤖 ' + text;
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
    return div;
}

function addLoading() {
    const history = document.getElementById('aiChatHistory');
    const div = document.createElement('div');
    div.className = 'ai-bubble-loading';
    div.textContent = '🤖 大師正在推算中…';
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
    return div;
}

// 主入口：初次呼叫（完整論命）
async function runAIMaster() {
    if (!chartData) { alert('請先排盤後再呼叫 AI 大師分析。'); return; }
    const btn = document.getElementById('btnAI');
    const wrap = document.getElementById('aiMasterWrap');
    btn.disabled = true;
    btn.textContent = '⏳ 連線中…';
    wrap.style.display = 'block';
    wrap.scrollIntoView({ behavior:'smooth', block:'start' });

    // 初始化對話
    aiSystemPrompt = buildAIContext();
    aiChatMessages = [];
    document.getElementById('aiChatHistory').innerHTML = '';

    const firstQ = '請為我進行完整的紫微斗數論命，依序分析：命格總論、財運格局、事業職涯、感情婚姻、本大限重點、流年提示，最後給出3條具體行動建議。';
    const loading = addLoading();
    try {
        const reply = await callAI(firstQ);
        loading.remove();
        addBubble('ai', reply);
        // 顯示追問區
        document.getElementById('aiQuickBtns').style.display = 'flex';
        document.getElementById('aiInputArea').style.display = 'block';
    } catch(e) {
        loading.remove();
        addBubble('ai', `⚠ 連線失敗：${e.message}\n請確認 Worker 已部署且 API Key 已設定。`);
    } finally {
        btn.disabled = false;
        btn.textContent = '🤖 AI 紫微大師深度論命';
    }
}

// 快速追問
async function aiQuickAsk(question) {

// 發送追問
async function aiSendMessage(overrideText) {
    const input = document.getElementById('aiUserInput');
    const msg = overrideText || input?.value?.trim();
    if (!msg) return;
    if (input) input.value = '';
    if (!aiSystemPrompt) aiSystemPrompt = buildAIContext();

    addBubble('user', msg);
    const loading = addLoading();
    try {
        const reply = await callAI(msg);
        loading.remove();
        addBubble('ai', reply);
    } catch(e) {
        loading.remove();
        addBubble('ai', `⚠ 錯誤：${e.message}`);
    }
}

// 📄 輸出 PDF（Canvas 截圖轉 PDF）
function exportAIPDF() {
    if (!aiChatMessages.length) { alert('尚無對話內容，請先進行論命。'); return; }
    const personName = document.getElementById('personName')?.value?.trim() || '命主';
    const bGan = chartData?.yearGan || '';
    const bZhi = chartData?.yearZhi || '';
    const fy = document.getElementById('flowYear')?.value || '';
    const now = new Date().toLocaleDateString('zh-TW');

    // 用 Canvas 繪製 PDF 內容
    const lines = [];
    lines.push('AI 紫微斗數大師・論命報告');
    lines.push(`命主：${personName}　生年：${bGan}${bZhi}年　流年：${fy}年`);
    lines.push(`產出日期：${now}`);
    lines.push('');
    aiChatMessages.forEach(m => {
        if (m.role === 'user') {
            lines.push(`▶ 提問：${m.content}`);
            lines.push('');
        } else {
            lines.push('【大師論斷】');
            m.content.split('\n').forEach(l => lines.push(l));
            lines.push('');
            lines.push('─'.repeat(50));
            lines.push('');
        }
    });

    // Canvas 多頁繪製
    const W = 794, H = 1123; // A4 px at 96dpi
    const MARGIN = 48, LINE_H = 22, FONT_SIZE = 13;
    const pageLines = Math.floor((H - MARGIN * 2) / LINE_H);
    const pages = [];
    for (let i = 0; i < lines.length; i += pageLines) {
        pages.push(lines.slice(i, i + pageLines));
    }

    const canvases = pages.map((pageContent, pi) => {
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        // 背景
        ctx.fillStyle = '#1a0a00';
        ctx.fillRect(0, 0, W, H);
        // 標題頁裝飾
        if (pi === 0) {
            ctx.fillStyle = 'rgba(184,134,11,0.15)';
            ctx.fillRect(0, 0, W, 80);
            ctx.fillStyle = '#b8860b';
            ctx.fillRect(0, 78, W, 2);
        }
        ctx.fillStyle = '#e8dcc8';
        ctx.font = `${FONT_SIZE}px "PingFang TC", "Microsoft JhengHei", serif`;
        pageContent.forEach((line, i) => {
            const y = MARGIN + i * LINE_H + (pi === 0 && i === 0 ? 10 : 0);
            if (i === 0 && pi === 0) {
                ctx.font = `bold 18px "PingFang TC", serif`;
                ctx.fillStyle = '#f0d090';
                ctx.fillText(line, MARGIN, MARGIN + 30);
                ctx.font = `${FONT_SIZE}px "PingFang TC", serif`;
                ctx.fillStyle = '#e8dcc8';
            } else if (line.startsWith('【')) {
                ctx.fillStyle = '#c39bd3';
                ctx.fillText(line, MARGIN, y);
                ctx.fillStyle = '#e8dcc8';
            } else if (line.startsWith('▶')) {
                ctx.fillStyle = '#74b9ff';
                ctx.fillText(line, MARGIN, y);
                ctx.fillStyle = '#e8dcc8';
            } else if (line.startsWith('─')) {
                ctx.fillStyle = 'rgba(184,134,11,0.4)';
                ctx.fillRect(MARGIN, y - 6, W - MARGIN * 2, 1);
                ctx.fillStyle = '#e8dcc8';
            } else {
                ctx.fillText(line, MARGIN, y);
            }
        });
        // 頁碼
        ctx.fillStyle = 'rgba(200,200,200,0.3)';
        ctx.font = `11px sans-serif`;
        ctx.fillText(`第 ${pi+1} / ${pages.length} 頁　AI 紫微斗數大師`, MARGIN, H - 20);
        return cv;
    });

    // 合併為單張長圖下載（簡易方案，無需 jsPDF）
    const totalH = H * canvases.length;
    const merged = document.createElement('canvas');
    merged.width = W; merged.height = totalH;
    const mCtx = merged.getContext('2d');
    canvases.forEach((cv, i) => mCtx.drawImage(cv, 0, i * H));
    merged.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `紫微論命_${personName}_${now.replace(/\//g,'-')}.png`;
        a.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}

// 🔗 分享（Web Share API + 備用複製）
async function shareAIReport() {
    if (!aiChatMessages.length) { alert('尚無對話內容，請先進行論命。'); return; }
    const personName = document.getElementById('personName')?.value?.trim() || '命主';
    const txt = getAIReportText();

    if (navigator.share) {
        try {
            await navigator.share({
                title: `${personName} 的紫微斗數論命報告`,
                text: txt,
            });
            return;
        } catch(e) { /* 使用者取消，fallback 到複製 */ }
    }
    // Fallback：複製到剪貼簿
    try {
        await navigator.clipboard.writeText(txt);
        alert('✅ 報告已複製到剪貼簿！\n可貼到 LINE、Email 或備忘錄分享。');
    } catch(e) {
        // 最後備用：textarea 選取複製
        const ta = document.createElement('textarea');
        ta.value = txt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ 報告已複製到剪貼簿！');
    }
}

function exportExpertPDF() {
    const area = document.getElementById('expertAnalysis');
    if (!area || !area.innerText.trim()) { alert('請先點擊「飛星深度理則分析」產生報告。'); return; }
    const personName = document.getElementById('personName')?.value?.trim() || '命主';
    const now = new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');

    // 用 html2canvas 截圖整個 expertAnalysisWrap
    const wrap = document.getElementById('expertAnalysisWrap');
    const origMax = area.style.maxHeight;
    area.style.maxHeight = 'none'; // 展開全部內容

    // Canvas 截圖（原生，不依賴外部庫）
    const W = 900;
    const lines = [];
    const bGan = chartData?.yearGan || '';
    const bZhi = chartData?.yearZhi || '';
    const fy = document.getElementById('flowYear')?.value || '';
    lines.push('⚖ 飛星深度理則分析報告');
    lines.push(`命主：${personName}　生年：${bGan}${bZhi}年　流年：${fy}年`);
    lines.push(`產出日期：${new Date().toLocaleDateString('zh-TW')}`);
    lines.push('');

    // 從 DOM 逐段擷取
    area.querySelectorAll('.zep-block, .zep-fly-item, [class*="zep"]').forEach(el => {
        const t = el.innerText.trim();
        if (t) t.split('\n').forEach(l => l.trim() && lines.push(l.trim()));
        lines.push('');
    });
    if (!area.querySelector('.zep-block')) {
        area.innerText.trim().split('\n').forEach(l => l.trim() && lines.push(l.trim()));
    }

    const LINE_H = 22, FONT = 13, MARGIN = 48, PW = W, PH = 1123;
    const maxLines = Math.floor((PH - MARGIN * 2) / LINE_H);
    const pages = [];
    for (let i = 0; i < lines.length; i += maxLines) pages.push(lines.slice(i, i + maxLines));
    if (!pages.length) pages.push(['（無內容）']);

    const canvases = pages.map((pg, pi) => {
        const cv = document.createElement('canvas');
        cv.width = PW; cv.height = PH;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = '#110820'; ctx.fillRect(0,0,PW,PH);
        if (pi===0) { ctx.fillStyle='rgba(184,134,11,0.12)'; ctx.fillRect(0,0,PW,72); }
        ctx.fillStyle='rgba(184,134,11,0.5)'; ctx.fillRect(0,72,PW,1);
        ctx.font=`${FONT}px "PingFang TC","Microsoft JhengHei",serif`;
        pg.forEach((line,i) => {
            const y = MARGIN + i * LINE_H + (pi===0&&i===0?12:0);
            if (i===0&&pi===0) {
                ctx.font=`bold 17px "PingFang TC",serif`; ctx.fillStyle='#f0d090';
                ctx.fillText(line, MARGIN, MARGIN+28);
                ctx.font=`${FONT}px "PingFang TC",serif`; ctx.fillStyle='#e8dcc8';
            } else if (line.startsWith('【')||line.startsWith('⚖')||line.startsWith('★')) {
                ctx.fillStyle='#c39bd3'; ctx.fillText(line,MARGIN,y); ctx.fillStyle='#e8dcc8';
            } else if (line.startsWith('▶')||line.startsWith('💡')||line.startsWith('🎯')) {
                ctx.fillStyle='#74b9ff'; ctx.fillText(line,MARGIN,y); ctx.fillStyle='#e8dcc8';
            } else if (/^[─=]{5,}/.test(line)) {
                ctx.fillStyle='rgba(184,134,11,0.35)'; ctx.fillRect(MARGIN,y-5,PW-MARGIN*2,1);
                ctx.fillStyle='#e8dcc8';
            } else { ctx.fillStyle='#e8dcc8'; ctx.fillText(line,MARGIN,y); }
        });
        ctx.fillStyle='rgba(200,200,200,0.25)'; ctx.font='11px sans-serif';
        ctx.fillText(`第${pi+1}/${pages.length}頁　⚖ 飛星深度理則分析`, MARGIN, PH-18);
        return cv;
    });

    const merged = document.createElement('canvas');
    merged.width = PW; merged.height = PH * canvases.length;
    const mCtx = merged.getContext('2d');
    canvases.forEach((cv,i) => mCtx.drawImage(cv,0,i*PH));
    merged.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url; a.download=`飛星分析_${personName}_${now}.png`;
        a.click(); URL.revokeObjectURL(url);
    },'image/png');
    area.style.maxHeight = origMax;
}
