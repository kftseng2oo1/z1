<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    
    
    
    
    
    <title>紫微斗數排盤系統</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1008;
            --paper: #f7f3e9;
            --paper-dark: #ede8d8;
            --gold: #b8860b;
            --gold-light: #d4a843;
            --vermillion: #c0392b;
            --azure: #1a5276;
            --azure-light: #2980b9;
            --purple: #6c3483;
            --jade: #0e6655;
            --lu: #d4a017;
            --quan: #c0392b;
            --ke: #2471a3;
            --ji: #1a1008;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #2c1810 0%, #1a1008 50%, #0d1117 100%);
            min-height: 100vh;
            color: var(--ink);
        }

        .header { text-align: center; padding: 30px 20px 15px; }
        .header h1 {
            font-family: "Noto Serif TC", serif;
            font-size: clamp(1.3rem, 3vw, 2rem);
            color: var(--gold-light);
            letter-spacing: 5px;
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .header .subtitle { font-size: 12px; color: #a89070; letter-spacing: 2px; margin-top: 6px; }
        .header::after { content:''; display:block; width:100px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:12px auto 0; }

        /* === CONTROLS === */
        .controls-wrap { max-width: 1450px; margin: 0 auto 15px; padding: 0 15px; }
        /* 人員紀錄面板 */
        .records-wrap { max-width:1450px; margin:0 auto 12px; padding:0 15px; }
        .records-panel {
            background:rgba(247,243,233,0.04); border:1px solid rgba(184,134,11,0.2);
            border-radius:8px; padding:12px 15px;
        }
        .records-title { font-size:11px; color:var(--gold-light); letter-spacing:1px; margin-bottom:8px; font-weight:500; }
        .records-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
        .record-chip {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(184,134,11,0.12); border:1px solid rgba(184,134,11,0.3);
            border-radius:20px; padding:4px 12px; font-size:12px; color:#e8dcc8;
            cursor:pointer; transition:all 0.2s;
        }
        .record-chip:hover { background:rgba(184,134,11,0.25); border-color:var(--gold); }
        .record-chip .chip-del { color:rgba(214,48,49,0.7); font-size:14px; line-height:1; cursor:pointer; }
        .record-chip .chip-del:hover { color:#d63031; }
        .btn-save {
            padding:6px 16px; background:rgba(39,174,96,0.2); border:1px solid rgba(39,174,96,0.4);
            color:#55efc4; border-radius:4px; font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .btn-save:hover { background:rgba(39,174,96,0.35); }
        .btn-reload {
            padding:6px 16px; background:rgba(52,152,219,0.2); border:1px solid rgba(52,152,219,0.4);
            color:#74b9ff; border-radius:4px; font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .btn-reload:hover { background:rgba(52,152,219,0.35); }
        /* AI 對話介面 */
        .ai-quick-btn {
            padding:5px 12px;background:rgba(155,89,182,0.15);border:1px solid rgba(155,89,182,0.35);
            color:#c39bd3;border-radius:16px;font-size:.8em;cursor:pointer;transition:all 0.2s;
            font-family:'Noto Serif TC',serif;
        }
        .ai-quick-btn:hover { background:rgba(155,89,182,0.35);color:#e8daef; }
        .ai-bubble-user {
            align-self:flex-end;background:rgba(108,52,131,0.3);border:1px solid rgba(155,89,182,0.4);
            border-radius:12px 12px 2px 12px;padding:10px 14px;max-width:85%;
            color:#e8daef;font-size:.88em;line-height:1.6;
        }
        .ai-bubble-ai {
            align-self:flex-start;background:rgba(26,0,80,0.5);border:1px solid rgba(155,89,182,0.2);
            border-radius:2px 12px 12px 12px;padding:12px 16px;max-width:95%;
            color:#e8dcc8;font-size:.9em;line-height:1.9;white-space:pre-wrap;
            font-family:'Noto Serif TC',serif;
        }
        .ai-bubble-loading {
            align-self:flex-start;color:rgba(195,155,211,0.7);font-size:.88em;
            padding:8px 0;animation:ai-pulse 1.2s infinite;
        }
        @keyframes ai-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            background: rgba(247,243,233,0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(184,134,11,0.2);
            padding: 15px;
            border-radius: 8px;
        }
        .ctrl-group label { display:block; font-size:11px; color:var(--gold-light); letter-spacing:1px; margin-bottom:4px; font-weight:500; }
        .ctrl-group select, .ctrl-group input {
            width:100%; padding:7px 8px; border:1px solid rgba(184,134,11,0.3); border-radius:4px;
            background:rgba(30,20,10,0.7); color:#e8dcc8; font-family:"Noto Sans TC",sans-serif; font-size:13px;
        }
        .ctrl-group select:focus, .ctrl-group input:focus { outline:none; border-color:var(--gold); }
        .btn-row { grid-column: 1 / -1; display: flex; gap: 10px; align-items: flex-end; }
        .btn-run {
            padding:9px 30px; background:linear-gradient(135deg,var(--gold) 0%,#8b6914 100%);
            color:#fff; border:none; border-radius:4px; font-family:"Noto Serif TC",serif;
            font-size:14px; font-weight:700; letter-spacing:3px; cursor:pointer; transition:all 0.3s;
        }
        .btn-run:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(184,134,11,0.4); }
        .birth-info {
            flex:1; font-size:12px; color:#a89070; line-height:1.6;
            padding:6px 12px; background:rgba(0,0,0,0.15); border-radius:4px;
        }

        /* === CHART === */
        .chart-wrap { max-width: 1450px; margin: 0 auto; padding: 0 15px; }
        .chart {
            display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,minmax(180px,1fr));
            gap:1px; background:var(--gold); border:3px solid var(--gold); border-radius:4px;
            overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.5);
        }
        .palace {
            background:var(--paper); position:relative; padding:28px 6px 26px 30px;
            display:flex; flex-direction:column; transition:background 0.2s; overflow:hidden; cursor:default;
        }
        .palace:hover { background:#fffdf5; z-index:5; }
        .palace.hl-source { background:#fff8e1; box-shadow:inset 0 0 0 2px var(--gold); }
        .palace.hl-lu { box-shadow:inset 0 0 0 3px var(--lu); }
        .palace.hl-ji { box-shadow:inset 0 0 0 3px var(--ji); }
        .palace.is-ming .p-name { background:var(--vermillion); color:#fff; }
        .palace.is-daxian { border-color:var(--gold-light) !important; box-shadow: inset 0 0 12px rgba(184,134,11,0.2); }
        .palace.is-daxian .p-name { border: 1px solid var(--gold-light); }

        .center-box {
            grid-column:2/4; grid-row:2/4; background:linear-gradient(145deg,#f7f3e9,#ede8d8);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding:15px;
        }
        .center-box h2 { font-family:"Noto Serif TC",serif; font-size:1.2em; color:var(--ink); letter-spacing:3px; }
        .center-box .info { font-size:12px; color:#666; margin-top:6px; line-height:1.7; }
        .center-box .fly-summary {
            margin-top:10px; text-align:left; font-size:11px; line-height:1.7; color:#555;
            max-height:210px; overflow-y:auto; width:100%; padding:8px;
            background:rgba(0,0,0,0.03); border-radius:4px;
        }
        .center-box .fly-summary::-webkit-scrollbar { width:4px; }
        .center-box .fly-summary::-webkit-scrollbar-thumb { background:#ccc; border-radius:2px; }

        /* Stars */
        .star-area { flex:1; display:flex; flex-direction:row-reverse; gap:5px; writing-mode:vertical-rl; overflow:hidden; }
        .star-item { display:flex; flex-direction:column; align-items:center; gap:1px; font-weight:700; font-size:13px; line-height:1.2; }
        .star-item.main { color:var(--vermillion); font-size:14px; }
        .star-item.assist { color:var(--azure); font-size:12px; }
        .star-item.malefic { color:var(--purple); font-size:12px; }
        .star-item.minor { color:#888; font-size:11px; }

        .sh-tag { writing-mode:horizontal-tb; font-size:9px; padding:1px 3px; border-radius:2px; line-height:1.2; font-weight:700; white-space:nowrap; margin-top:1px; }
        .sh-lu { background:var(--lu); color:#fff; }
        .sh-quan { background:var(--quan); color:#fff; }
        .sh-ke { background:var(--ke); color:#fff; }
        .sh-ji { background:var(--ji); color:#fff; }

        .gan-tag { position:absolute; top:6px; left:6px; font-family:"Noto Serif TC",serif; font-weight:700; color:var(--ink); font-size:12px; opacity:0.7; }
        .p-name { position:absolute; bottom:5px; left:50%; transform:translateX(-50%); font-family:"Noto Serif TC",serif; font-weight:700; font-size:12px; color:var(--ink); background:var(--paper-dark); padding:2px 6px; border-radius:3px; white-space:nowrap; }
        .dz-tag { position:absolute; bottom:6px; left:6px; font-size:10px; color:#aaa; }
        .body-tag { position:absolute; top:6px; right:6px; font-size:9px; color:#999; }

        .fly-indicators { position:absolute; top:20px; right:6px; display:flex; flex-direction:column; gap:2px; align-items:flex-end; }
        .fly-ind { font-size:9px; padding:1px 4px; border-radius:2px; font-weight:700; opacity:0.9; }
        .fly-ind.birth { border:1px solid; }
        .fly-ind.year { border:1px dashed; }
        .fly-ind.lu-ind { color:var(--lu); border-color:var(--lu); background:rgba(212,160,23,0.08); }
        .fly-ind.quan-ind { color:var(--quan); border-color:var(--quan); background:rgba(192,57,43,0.08); }
        .fly-ind.ke-ind { color:var(--ke); border-color:var(--ke); background:rgba(36,113,163,0.08); }
        .fly-ind.ji-ind { color:var(--ji); border-color:var(--ji); background:rgba(26,16,8,0.08); }

        .self-trans { position:absolute; top:20px; left:28px; font-size:10px; color:#e67e22; font-weight:700; line-height:1.4; pointer-events:none; }

        /* Fly palette */
        .fly-palette { max-width:1450px; margin:10px auto; padding:0 15px; }
        .fly-btns { display:flex; flex-wrap:wrap; gap:5px; background:rgba(0,0,0,0.15); padding:10px; border-radius:6px; }
        .fly-btn {
            padding:4px 12px; border:1px solid rgba(184,134,11,0.3); border-radius:3px;
            background:rgba(30,20,10,0.6); color:#cdb893; font-size:11px; cursor:pointer;
            transition:all 0.2s; font-family:"Noto Sans TC",sans-serif;
        }
        .fly-btn:hover { background:rgba(184,134,11,0.3); color:#fff; }
        .fly-btn.active { background:var(--gold); color:#fff; border-color:var(--gold); }

        /* Report */
        .report-wrap { max-width:1450px; margin:20px auto 40px; padding:0 15px; }
        .report { background:rgba(247,243,233,0.04); backdrop-filter:blur(10px); border:1px solid rgba(184,134,11,0.15); border-radius:8px; padding:25px; }
        .report h3 { font-family:"Noto Serif TC",serif; color:var(--gold-light); font-size:1em; letter-spacing:3px; margin-bottom:15px; }

        /* === 核心摘要區 === */
        .summary-box {
            background: linear-gradient(135deg, #dfd7c2 0%, #ede8d8 100%);
            border: 2px solid var(--gold); border-radius: 10px;
            padding: 18px 20px; margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .summary-box h4 {
            font-family:"Noto Serif TC",serif; margin: 0 0 12px 0;
            color: var(--ink); font-size: 14px; letter-spacing: 2px;
            border-bottom: 1px solid rgba(184,134,11,0.3); padding-bottom: 8px;
        }
        .summary-item {
            font-size: 13px; line-height: 1.9; color: #333;
            border-bottom: 1px dashed rgba(0,0,0,0.1); padding: 5px 0;
        }
        .summary-item:last-child { border: none; }
        .summary-item b { color: var(--vermillion); }

        /* === 摺疊卡片 === */
        .report-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card {
            background: rgba(247,243,233,0.96); border-radius: 7px;
            border-left: 5px solid var(--gold);
            overflow: hidden; transition: box-shadow 0.25s ease, transform 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .card.open { box-shadow: 0 6px 24px rgba(0,0,0,0.22); transform: translateY(-1px); }
        .card.conflict { border-left-color: var(--vermillion); }
        .card.health { border-left-color: var(--jade); }
        .card.marriage { border-left-color: #e91e8c; }
        .card.children { border-left-color: #ff9800; }
        .card.cause-effect { border-left-color: var(--jade); }
        .card.qishu { border-left-color: var(--azure); }

        /* 卡片標題列 */
        .card-h {
            font-family:"Noto Serif TC",serif; font-weight:700; color:var(--ink);
            font-size: 13px; letter-spacing: 1px;
            padding: 13px 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
        }
        .card-h::after {
            content: '▼'; font-size: 11px; color: #aaa;
            transition: transform 0.25s ease, color 0.2s;
            flex-shrink: 0; margin-left: 8px;
        }
        .card.open .card-h::after { transform: rotate(180deg); color: var(--gold); }

        /* 摺疊內容 */
        .card-body {
            max-height: 0; opacity: 0;
            overflow: hidden; transition: max-height 0.35s ease, opacity 0.25s ease;
            background: #fff;
        }
        .card.open .card-body { max-height: 4000px; opacity: 1; }
        .card-body-inner { padding: 14px 16px 16px; border-top: 1px solid #ece8de; }
        .card p { font-size: 12px; line-height: 1.9; color: #444; }
        .card .note { font-size: 10px; color: #999; font-style: italic; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #eee; }

        @media(max-width:900px) {
            .chart { grid-template-rows:repeat(4,minmax(150px,1fr)); }
            .star-item { font-size:11px; } .star-item.main { font-size:12px; }
            .palace { padding:24px 4px 22px 26px; }
        }
        @media(max-width:600px) {
            .chart { grid-template-rows:repeat(4,minmax(115px,1fr)); }
            .star-item { font-size:9px; } .star-item.main { font-size:10px; }
            .sh-tag { font-size:7px; padding:0 2px; }
            .palace { padding:20px 3px 20px 22px; }
            .controls { grid-template-columns:1fr 1fr; }
        }
    </style>

<body>
<div class="header">
    <h1>紫微斗數・完整排盤飛宮系統</h1>
    <div class="subtitle">曾大師理則 ── 自動安星・宮干飛化・體用整合</div>
</div>

<div class="controls-wrap">
    <div class="controls">
        <div class="ctrl-group">
            <label>出生年 (國曆)</label>
            <select id="solarYear"></select>
        </div>
        <div class="ctrl-group">
            <label>出生月 (國曆)</label>
            <select id="solarMonth"></select>
        </div>
        <div class="ctrl-group">
            <label>出生日 (國曆)</label>
            <select id="solarDay"></select>
        </div>
        <div class="ctrl-group">
            <label>出生時辰</label>
            <select id="birthHour">
                <option value="0">子時 (23-01)</option>
                <option value="1">丑時 (01-03)</option>
                <option value="2">寅時 (03-05)</option>
                <option value="3">卯時 (05-07)</option>
                <option value="4">辰時 (07-09)</option>
                <option value="5">巳時 (09-11)</option>
                <option value="6" selected>午時 (11-13)</option>
                <option value="7">未時 (13-15)</option>
                <option value="8">申時 (15-17)</option>
                <option value="9">酉時 (17-19)</option>
                <option value="10">戌時 (19-21)</option>
                <option value="11">亥時 (21-23)</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>性別</label>
            <select id="gender">
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
        </div>
        <!-- 閏月自動偵測 -->
        <div class="ctrl-group">
            <label>流年（西元年）</label>
            <input type="number" id="flowYear" value="2026" min="1924" max="2100">
        </div>
        <div class="ctrl-group" style="display:none;">
            <label>飛宮觀測</label>
            <select id="flySource"><option value="">全盤總覽</option></select>
        </div>
        <div class="ctrl-group">
            <label>姓名／備註</label>
            <input type="text" id="personName" placeholder="輸入姓名或備註" maxlength="20">
        </div>
        <div class="btn-row">
            <button class="btn-run" onclick="runChart()">排盤推演</button>
            <button class="btn-save" onclick="saveRecord()">💾 儲存此人</button>
            <div class="birth-info" id="birthInfo">請輸入國曆出生日期後按「排盤推演」</div>
        </div>
    </div>
</div>

<!-- 人員紀錄列 -->
<div class="records-wrap">
    <div class="records-panel" id="recordsPanel" style="display:none;">
        <div class="records-title">📋 已儲存人員（點擊姓名重新排盤）</div>
        <div class="records-list" id="recordsList"></div>
    </div>
</div>

<div class="fly-palette" style="display:none;"><div class="fly-btns" id="flyBtns"></div></div>

<div class="chart-wrap"><div class="chart" id="chartArea"></div></div>

<div class="report-wrap">
    <div class="report" id="reportArea" style="display:none;">
        <h3>【三層飛宮分析報告：體（生年）・用（大限）・出（流年）】</h3>
        <div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
            <button onclick="toggleExpertReport()" id="btnExpert"
                style="background:linear-gradient(135deg,#5a3000,#b8860b);border:none;color:#fff8e7;
                       font-family:'Noto Serif TC',serif;font-size:0.9em;letter-spacing:0.15em;
                       padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:700;
                       box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:opacity 0.2s;"
                onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
                ⚖ 大師級飛星深度理則分析
            </button>
            <button onclick="runAIMaster()" id="btnAI"
                style="background:linear-gradient(135deg,#1a0050,#6c3483);border:1px solid rgba(155,89,182,0.5);
                       color:#e8daef;font-family:'Noto Serif TC',serif;font-size:0.9em;letter-spacing:0.15em;
                       padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:700;
                       box-shadow:0 2px 12px rgba(108,52,131,0.4);transition:opacity 0.2s;"
                onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
                🤖 AI 紫微大師深度論命
            </button>
        </div>
        <div class="summary-box" id="quickSummary" style="display:none;"></div>
        <div class="report-grid" id="reportGrid"></div>
        <!-- AI 大師分析輸出區 -->
        <div id="aiMasterWrap" style="display:none;margin-top:24px;">
            <div style="border:1px solid rgba(155,89,182,0.4);border-radius:10px;
                        background:rgba(26,0,80,0.3);backdrop-filter:blur(8px);padding:20px 24px;">
                <!-- 標題列 -->
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;
                            border-bottom:1px solid rgba(155,89,182,0.3);padding-bottom:12px;">
                    <span style="font-size:1.4em;">🤖</span>
                    <div>
                        <div style="color:#c39bd3;font-size:.8em;letter-spacing:2px;">AI 紫微斗數大師</div>
                        <div style="color:#e8daef;font-size:1em;font-weight:700;letter-spacing:1px;">深度論命・對話諮詢</div>
                    </div>

function lunarMonthDays(y,m){return(LUNAR_INFO[y-1900]&(0x10000>>m))?30:29;}
function leapMonth(y){return LUNAR_INFO[y-1900]&0xf;}
function leapDays(y){if(leapMonth(y))return(LUNAR_INFO[y-1900]&0x10000)?30:29;return 0;}
function lunarYearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(LUNAR_INFO[y-1900]&i)?1:0;return s+leapDays(y);}

function solarToLunar(sy, sm, sd) {
    // 使用 Date.UTC 確保無時區偏移，Math.floor 確保精確整數
    const base = Date.UTC(1900, 0, 31);
    const target = Date.UTC(sy, sm - 1, sd);
    let offset = Math.floor((target - base) / 86400000);

    let ly = 1900;
    for (; ly < 2101; ly++) {
        const yDays = lunarYearDays(ly);
        if (offset < yDays) break;
        offset -= yDays;
    }
    const leap = leapMonth(ly);
    let lm = 0, isLeapMonth = false;
    for (let i = 1; i <= 12; i++) {
        const mDays = lunarMonthDays(ly, i);
        if (offset < mDays) { lm = i; break; }
        offset -= mDays;
        if (i === leap) {
            const lDays = leapDays(ly);
            if (offset < lDays) { lm = i; isLeapMonth = true; break; }
            offset -= lDays;
        }
    }
    if (lm === 0) lm = 12;
    return { year: ly, month: lm, day: offset + 1, isLeap: isLeapMonth, leapMonth: leap };
}

class Palace {
    constructor(palaceIndex, dzIdx, gan) {
        this.index = palaceIndex;         // 宮序 0-11（命宮=0）
        this.dzIdx = dzIdx;               // 地支索引
        this.dz = DI_ZHI[dzIdx];

    }

    /** 取得對宮（沖宮）索引，命=0對遷=6，財=4對田=10，etc. */
    getOppositePalaceIndex() {
        return (this.index + 6) % 12;
    }

    /** 取得三方四正（本宮＋對宮＋三合二宮）的宮序陣列 */
    getThreeHarmonyGroup() {
        const base = this.index;
        return [
            base,
            (base + 4) % 12,
            (base + 8) % 12,
            (base + 6) % 12   // 對宮補入四正
        ];
    }

    /** 判斷此宮是否為「我宮」（命遷財官三方四正視角）*/
    isSelfGroup(palaceIndex) {
        return this.getThreeHarmonyGroup().includes(palaceIndex);
    }

    getLiuHePalaceDz() {
        const liuhe = [1,0,11,10,9,8,7,6,5,4,3,2]; // 每個地支的六合地支索引
        return DI_ZHI[liuhe[this.dzIdx]];
    }

    /** 計算本宮飛化落點（配合全盤 palaces 陣列）*/
    computeSihua(allPalaces) {
        if (!SIHUA[this.gan]) { this.sihua = null; return null; }
        const sh = SIHUA[this.gan];
        const result = {};
        for (const k of SH_KEYS) {
            const starName = sh[k];
            const target = allPalaces.find(p =>
                [...p.stars.m, ...p.stars.a, ...p.stars.b].includes(starName)
            );
            result[k] = {
                star: starName,
                targetPalace: target ? target.name : '(盤外)',
                targetPalaceIndex: target ? target.index : -1,
                targetDz: target ? target.dz : '',
                isSelfTarget: target ? this.isSelfGroup(target.index) : false
            };
        }
        this.sihua = result;
        return result;
    }

    /** 偵測自化 */
    getSelfTransformations() {
        if (!SIHUA[this.gan]) return [];
        const sh = SIHUA[this.gan];
        const all = [...this.stars.m, ...this.stars.a, ...this.stars.b];
        return SH_KEYS
            .filter(k => all.includes(sh[k]))
            .map(k => ({ type: k, star: sh[k] }));
    }
}

/** 取得星曜特徵向量 */
function getStarFeature(starName) {
    return STAR_FEATURES[starName] || null;
}

/** 檢查星曜與宮位的契合度 */
function checkStarPalaceCompatibility(starName, palaceName) {
    const f = getStarFeature(starName);
    if (!f) return { level: 'neutral', note: '' };
    if (f.palaceFit.best.some(p => p.includes(palaceName.replace('宮','')))) {
        return { level: 'good', note: `${starName}入${palaceName}契合，星性得以發揮` };
    }
    if (f.palaceFit.worst.some(p => p.includes(palaceName.replace('宮','')))) {
        return { level: 'poor', note: `${starName}入${palaceName}星性受抑，需注意` };
    }
    return { level: 'neutral', note: '' };
}

    if (eventTemplates[key] && eventTemplates[key][huaType]) {

    const genericHua = {

}

/**
 * 三層體用出解釋器
 * 整合生年（體）、大限（用）、流年（出）三層飛化，
 * 針對某目標宮位生成完整解讀
 */
function interpretThreeLayers(targetPalaceName, allPalaces, bGan, dxGan, yGan) {
    const lines = [];
    const layers = [
        { gan: bGan, layer: 'birth', label: '生年（體）' },
        { gan: dxGan, layer: 'decade', label: '大限（用）' },
        { gan: yGan, layer: 'year', label: '流年（出）' },
    ].filter(l => !!l.gan);

    for (const { gan, layer, label } of layers) {
        const sh = SIHUA[gan];
        if (!sh) continue;
        for (const k of SH_KEYS) {
            const starName = sh[k];
            const targetP = allPalaces.find(p =>
                [...p.stars.m, ...p.stars.a, ...p.stars.b].includes(starName)
            );
            if (targetP && targetP.name === targetPalaceName) {
                // 找出飛出的宮位（以天干推算哪個宮位有此干）
                const originP = allPalaces.find(p => p.gan === gan);
                const originName = originP ? originP.name : '生年/大限/流年干宮';
                const interp = interpretEvent(originName, targetPalaceName, k, layer);
                if (interp) lines.push(interp);
            }
        }
    }

    // 目標宮自飛分析
    const tgtP = allPalaces.find(p => p.name === targetPalaceName);
    if (tgtP) {
        const selfTrans = tgtP.getSelfTransformations ? tgtP.getSelfTransformations() :
            (() => {
                const sh = SIHUA[tgtP.gan]; if (!sh) return [];
                const all = [...tgtP.stars.m, ...tgtP.stars.a, ...tgtP.stars.b];
                return SH_KEYS.filter(k => all.includes(sh[k])).map(k => ({ type: k, star: sh[k] }));
            })();
        selfTrans.forEach(st => {
            const interp = interpretEvent(targetPalaceName, targetPalaceName, st.type, 'birth');
            if (interp) lines.push(interp);
        });
    }
    return lines;
}

/**
 * 分析六大宮之間所有祿忌互飛關係，
 * 生成「A宮飛忌入B宮，B宮飛祿回A宮＝一牽一拉」等聯動解讀
 */
function analyzePalaceMutualFlying(allPalaces) {
    const sixPalaces = ['命宮','財帛宮','官祿宮','夫妻宮','福德宮','田宅宮'];
    const results = [];

    for (let i = 0; i < sixPalaces.length; i++) {
        for (let j = i + 1; j < sixPalaces.length; j++) {
            const nameA = sixPalaces[i];
            const nameB = sixPalaces[j];
            const pA = allPalaces.find(p => p.name === nameA);
            const pB = allPalaces.find(p => p.name === nameB);
            if (!pA || !pB) continue;

            const flyA = computeFly(allPalaces, pA.gan);
            const flyB = computeFly(allPalaces, pB.gan);

            // A飛祿入B、B飛忌入A ── 「一方付出，一方施壓」
            const aLuToB = flyA.祿.targetPalace === nameB;
            const bJiToA = flyB.忌.targetPalace === nameA;
            const aJiToB = flyA.忌.targetPalace === nameB;
            const bLuToA = flyB.祿.targetPalace === nameA;

            if (aLuToB && bJiToA) {
                results.push(`⚡ 【${nameA}↔${nameB}互飛】${nameA}飛<span style="color:var(--lu)">祿</span>入${nameB}，${nameB}飛<span style="color:var(--ji)">忌</span>回${nameA} ── ${PALACE_SEMANTICS[nameA].self}主動付出，卻被${PALACE_SEMANTICS[nameB].self}的問題反壓。`);
            }
            if (aJiToB && bLuToA) {
                results.push(`✦ 【${nameA}↔${nameB}互飛】${nameA}飛<span style="color:var(--ji)">忌</span>入${nameB}，${nameB}飛<span style="color:var(--lu)">祿</span>回${nameA} ── ${nameA}的問題雖投射至${nameB}，但${nameB}反以祿回饋，先難後甜。`);
            }
            if (aLuToB && bLuToA) {
                results.push(`🌟 【${nameA}↔${nameB}雙祿互飛】兩宮互相滋養，${PALACE_SEMANTICS[nameA].domain}與${PALACE_SEMANTICS[nameB].domain}相輔相成，為命盤大吉格局。`);
            }
            if (aJiToB && bJiToA) {
                results.push(`⚠ 【${nameA}↔${nameB}雙忌互沖】兩宮互相施壓，${PALACE_SEMANTICS[nameA].domain}與${PALACE_SEMANTICS[nameB].domain}相互牽制，需謹慎。`);
            }
        }
    }
    return results;
}

// ──────────────────────────────────────────────

function analyzeOverlaps(allPalaces, bGan, dxGan, yGan) {
    const layers = [
        { gan: bGan, label: '生年（體）', weight: 3 },
        { gan: dxGan, label: '大限（用）', weight: 2 },
        { gan: yGan, label: '流年（出）', weight: 1 },
    ].filter(l => !!l.gan);

    const jiMap = {}; // palaceName → [{label, star}]
    const luMap = {};

    for (const { gan, label } of layers) {
        const fly = computeFly(allPalaces, gan);
        const sh = SIHUA[gan];
        if (!fly || !sh) continue;

        const jiP = fly.忌.targetPalace;
        const luP = fly.祿.targetPalace;

        if (!jiMap[jiP]) jiMap[jiP] = [];
        jiMap[jiP].push({ label, star: sh['忌'] });

        if (!luMap[luP]) luMap[luP] = [];
        luMap[luP].push({ label, star: sh['祿'] });
    }

    const results = [];
    for (const [palace, items] of Object.entries(jiMap)) {
        if (items.length >= 3) {
            results.push({ type: 'triple_ji', palace, items, severity: 'critical',
                msg: `⚠⚠⚠ 三疊忌（體用出）同入【${palace}】：${items.map(i => i.label + i.star + '忌').join('、')} ── 命盤最強壓力點，${PALACE_SEMANTICS[palace]?.domain || palace}面臨重大考驗，此為宿命課題。` });
        } else if (items.length === 2) {
            results.push({ type: 'double_ji', palace, items, severity: 'warning',
                msg: `⚠⚠ 雙疊忌入【${palace}】：${items.map(i => i.label + i.star + '忌').join('、')} ── ${PALACE_SEMANTICS[palace]?.domain || palace}壓力極大，需特別留意。` });
        }
    }
    for (const [palace, items] of Object.entries(luMap)) {
        if (items.length >= 3) {
            results.push({ type: 'triple_lu', palace, items, severity: 'excellent',
                msg: `🌟 三疊祿（體用出）同入【${palace}】：${items.map(i => i.label + i.star + '祿').join('、')} ── 命盤最強福祿點，${PALACE_SEMANTICS[palace]?.domain || palace}天時地利人和，大吉大利！` });
        } else if (items.length === 2) {
            results.push({ type: 'double_lu', palace, items, severity: 'good',
                msg: `✦✦ 雙疊祿入【${palace}】：${items.map(i => i.label + i.star + '祿').join('、')} ── ${PALACE_SEMANTICS[palace]?.domain || palace}雙重加持，此十年或今年此領域旺盛。` });
        }
    }
    return results;
}

// ──────────────────────────────────────────────
//  A. 氣數位（第九宮）聯動分析
//     許氏：每宮的「官祿位」= 從該宮順數第9宮（含自身=1）
//     代表「此宮事務運作的背後動力與環境」
// ──────────────────────────────────────────────
function getQiShuPalaceIndex(palaceIndex) {
    // 順數第9宮（自身為1，所以+8）
    return (palaceIndex + 8) % 12;
}
function getQiShuPalaceName(palaceName, allPalaces) {
    const p = allPalaces.find(pp => pp.name === palaceName);
    if (!p) return null;
    const qsIdx = getQiShuPalaceIndex(p.index);
    return allPalaces.find(pp => pp.index === qsIdx) || null;
}

/**
 * 氣數位聯動卡片：分析六大宮的第九宮（官祿位）
 * 揭示「表面好壞」與「背後環境支撐度」的落差
 */
function analyzeQiShuLinkage(allPalaces, bGan, dxGan, yGan) {
    const targets = [
        { name: '命宮',  qsLabel: '命之官（氣數）', scenario: '自身能量背後的環境支撐' },
        { name: '財帛宮', qsLabel: '財之官（財帛氣數）', scenario: '賺錢過程的辛苦程度' },
        { name: '官祿宮', qsLabel: '官之官（官職氣數）', scenario: '事業地位是否穩固' },
        { name: '夫妻宮', qsLabel: '夫之官（感情氣數）', scenario: '婚姻關係的外部壓力' },
    ];
    const results = [];
    const layers = [
        { gan: bGan, label: '生年', layer: 'birth' },
        { gan: dxGan, label: '大限', layer: 'decade' },
        { gan: yGan, label: '流年', layer: 'year' },
    ].filter(l => !!l.gan);

    for (const { name, qsLabel, scenario } of targets) {
        const srcP = allPalaces.find(p => p.name === name);
        if (!srcP) continue;
        const qsP = getQiShuPalaceName(name, allPalaces);
        if (!qsP) continue;

        const srcFly = computeFly(allPalaces, srcP.gan);
        const qsFly  = computeFly(allPalaces, qsP.gan);
        const lines = [`<b>【${qsLabel}】── ${name}的第九宮為 ${qsP.name}（${qsP.gan}干）── ${scenario}：</b>`];

        // 核心宮本身飛祿/忌
        const srcLuTo = srcFly.祿.targetPalace;
        const srcJiTo = srcFly.忌.targetPalace;
        lines.push(`　${name}（${srcP.gan}干）自飛：祿→${srcLuTo}，忌→${srcJiTo}`);

        // 氣數位飛化
        const qsLuTo = qsFly.祿.targetPalace;
        const qsJiTo = qsFly.忌.targetPalace;
        lines.push(`　${qsP.name}（${qsP.gan}干）氣數飛：祿→${qsLuTo}，忌→${qsJiTo}`);

        // 聯動解讀：氣數位飛忌回目標宮 = 表面機會好但背後辛苦
        if (qsJiTo === name) {
            lines.push(`　⚠ 氣數位飛忌回【${name}】── 背後環境對${name}施壓，${scenario}充滿阻力，即使表面看似順利，骨子裡仍須付出極大代價。`);
        }
        if (qsLuTo === name) {
            lines.push(`　✦ 氣數位飛祿入【${name}】── 背後環境支撐${name}，${scenario}有外力相助，事半功倍。`);
        }
        // 氣數位飛忌入命 = 事業或財務的辛苦最終壓到自身
        if (qsJiTo === '命宮' && name !== '命宮') {
            lines.push(`　⚠ ${name}的氣數飛忌入命 ── ${scenario}的困難最終由本人承受，心力交瘁。`);
        }
        // 三層四化對氣數位的衝擊
        for (const { gan, label } of layers) {
            const fly = computeFly(allPalaces, gan);
            if (fly.忌.targetPalace === qsP.name) {
                lines.push(`　⚠ ${label}忌（${SIHUA[gan]?.忌}）落入${qsP.name}（${name}的氣數位）── ${label}期間，${scenario}的環境最為嚴峻。`);
            }
            if (fly.祿.targetPalace === qsP.name) {
                lines.push(`　✦ ${label}祿（${SIHUA[gan]?.祿}）落入${qsP.name}（${name}的氣數位）── ${label}期間，${scenario}的外部環境大好，順勢而為。`);
            }
        }
        results.push(lines.join('<br>'));
    }
    return results;
}

// ──────────────────────────────────────────────
//  B. 自化截斷效應（過路財神邏輯）
//     在 interpretEvent 的目標宮有自化時，附加截斷解讀
// ──────────────────────────────────────────────
function checkTargetSelfTrans(targetPalaceName, allPalaces) {
    const p = allPalaces.find(pp => pp.name === targetPalaceName);
    if (!p || !SIHUA[p.gan]) return [];
    const sh = SIHUA[p.gan];
    const all = [...p.stars.m, ...p.stars.a, ...p.stars.b];
    return SH_KEYS.filter(k => all.includes(sh[k])).map(k => ({ type: k, star: sh[k] }));
}

/**
 * 增強版 interpretEvent：在目標宮有自化時，附加「截斷/洩漏」解釋
 */
function interpretEventWithSelfTrans(originPalace, targetPalace, huaType, layer, allPalaces) {
    let base = interpretEvent(originPalace, targetPalace, huaType, layer);
    if (!base) {
        // fallback generic
        const layerLabel = { birth: '先天（生年）', decade: '大限（十年）', year: '流年（今年）' }[layer] || '';
        const huaLabel = { 祿: '福祿', 權: '主導力', 科: '才名', 忌: '壓力' }[huaType] || huaType;
        base = `${layerLabel}：【${originPalace}】飛${huaType}入【${targetPalace}】，${originPalace}的${huaLabel}投注至${targetPalace}。`;
    }
    if (!allPalaces) return base;

    const selfTrans = checkTargetSelfTrans(targetPalace, allPalaces);
    if (!selfTrans.length) return base;

    // 自化附加解釋模板
    const SELF_TRANS_ADDON = {
        '祿→自化忌': (origin, target) =>
            `⟳ 但【${target}】宮有「自化忌」── 能量進入後向外洩散！如「過路財神」：${origin}的祿機確實降臨，卻因${target}自身能量不穩定而消散流失，需主動鎖住此宮的資源。`,
        '祿→自化祿': (origin, target) =>
            `⟳ 【${target}】宮同有「自化祿」── 能量進入後再次向外流出，雖吉象疊加，但${target}的祿過於流動，資源難以留存，如活水不停流。`,
        '忌→自化忌': (origin, target) =>
            `⟳ 【${target}】宮亦有「自化忌」── 雙忌交疊！外來壓力（${origin}飛忌）加上內部洩漏（${target}自化忌），此宮如雪上加霜，${target}相關事務極度不穩，需高度防範。`,
        '忌→自化祿': (origin, target) =>
            `⟳ 【${target}】宮有「自化祿」── 外來的忌壓（${origin}飛忌）部分被本宮自化祿所中和，但自化祿也代表能量外流，整體呈現「先受壓後洩出」的不穩定狀態。`,
        '權→自化忌': (origin, target) =>
            `⟳ 【${target}】宮有「自化忌」── 外來的主導力（${origin}飛權）無法留存，控制力進入後即被本宮消耗，難以形成長期掌控。`,
        '科→自化忌': (origin, target) =>
            `⟳ 【${target}】宮有「自化忌」── 才名科甲雖入此宮，卻因自化忌而減損，聲名或才藝的發揮受到內部因素干擾。`,
    };

    const addons = [];
    selfTrans.forEach(st => {
        const addonKey = `${huaType}→自化${st.type}`;
        const fn = SELF_TRANS_ADDON[addonKey];
        if (fn) addons.push(fn(originPalace, targetPalace));
        else addons.push(`⟳ 【${targetPalace}】另有「${st.star}自化${st.type}」── 此宮本身能量${st.type === '忌' ? '向外洩散' : '流動不定'}，外來飛化效果因此產生變數。`);
    });

    return base + (addons.length ? '<br><span style="color:#e67e22;font-size:11px;">' + addons.join('<br>') + '</span>' : '');
}

function analyzeCauseAndEffect(allPalaces, bGan, dxGan, yGan) {
    const layers = [
        { gan: bGan, label: '生年（體）', layer: 'birth' },
        { gan: dxGan, label: '大限（用）', layer: 'decade' },
        { gan: yGan, label: '流年（出）', layer: 'year' },
    ].filter(l => !!l.gan);

    const results = [];

    for (const { gan, label, layer } of layers) {
        const sh = SIHUA[gan];
        const fly = computeFly(allPalaces, gan);
        if (!sh || !fly) continue;

        const luPalace = fly.祿.targetPalace;   // 祿落點 = 「因」
        const jiPalace = fly.忌.targetPalace;   // 忌落點 = 「果」
        const luStar   = sh['祿'];
        const jiStar   = sh['忌'];

        const key = `${luPalace}→${jiPalace}`;
        const mapEntry = CAUSE_EFFECT_MAP[key];

        const layerLabel = { birth: '先天（生年）', decade: '大限（十年）', year: '流年（今年）' }[layer];

        let line = `<b>【${label} ${gan}干】祿随忌走：${luStar}祿入【${luPalace}】→ 因此 ${jiStar}忌落【${jiPalace}】</b>`;
        if (mapEntry) {
            line += `<br>　✎ 因：${mapEntry.cause}（${luPalace}）`;
            line += `<br>　✎ 果：${mapEntry.effect}（${jiPalace}）`;
            line += `<br>　▶ 論斷：「${mapEntry.story}」`;
        } else {
            // 通用模板
            const luSem = PALACE_SEMANTICS[luPalace];
            const jiSem = PALACE_SEMANTICS[jiPalace];
            if (luSem && jiSem) {
                line += `<br>　✎ 因：得到${luSem.self}的祿（${luSem.domain}方面的開展）`;
                line += `<br>　✎ 果：${jiSem.self}受到忌壓（${jiSem.domain}方面付出代價）`;
                line += `<br>　▶ 論斷：「因${luSem.domain}的得益，以${jiSem.domain}為代價；得失之間，見此人命中之取捨與課題。」`;
            }
        }

        // 若祿忌同宮（自沖），特別標註
        if (luPalace === jiPalace) {
            line += `<br>　⚡ 祿忌同宮！此宮既是「因」也是「果」，${luPalace}的事務既帶來機會，也同時製造壓力，一宮承擔所有吉凶，能量高度集中於此。`;
        }

        results.push({ label, line });
    }
    return results;
}

// ──────────────────────────────────────────────
//  D. 核心矛盾分析（命盤最深層衝突偵測）
//     三大矛盾類型：
//     1. 疊忌沖破生年祿（先天福報被後天毀壞）
//     2. 祿忌往來（宮位間的深層對待）
//     3. 體用不位（情感宮 vs 物質宮的衝突）
// ──────────────────────────────────────────────
function analyzeCoreConflicts(allPalaces, bGan, dxGan, yGan) {
    const conflicts = [];
    const bFly = computeFly(allPalaces, bGan);
    const dxFly = dxGan ? computeFly(allPalaces, dxGan) : null;
    const yFly  = computeFly(allPalaces, yGan);

    const bLuPalace = bFly?.祿.targetPalace;
    const bJiPalace = bFly?.忌.targetPalace;
    const dxLuPalace = dxFly?.祿.targetPalace;
    const dxJiPalace = dxFly?.忌.targetPalace;
    const yLuPalace  = yFly?.祿.targetPalace;
    const yJiPalace  = yFly?.忌.targetPalace;

    // 1. 疊忌沖破生年祿
    //    大限忌或流年忌，落在生年祿所在宮位 → 先天福報被當期破壞
    if (dxJiPalace && dxJiPalace === bLuPalace) {
        const bLuStar = bFly.祿.star;
        const dxJiStar = dxFly.忌.star;
        const sem = PALACE_SEMANTICS[bLuPalace];
        conflicts.push({
            type: 'lu_destroyed',
            severity: 'critical',
            msg: `🔴 【矛盾：大限忌沖破生年祿】` +
                 `<br>生年祿（${bLuStar}祿）落入【${bLuPalace}】，代表先天在${sem?.domain || bLuPalace}方面福澤深厚；` +
                 `<br>然而大限忌（${dxJiStar}忌）亦落入同一宮【${bLuPalace}】，形成「疊忌破祿」！` +
                 `<br>▶ 論斷：此十年，命中原本最大的福報反而成為壓力最集中處。先天賦予的優勢（${sem?.domain || ''}），` +
                 `在此大限期間反被命運考驗，須特別防守，切勿在此十年輕率揮霍先天資本。<br><br>💡 <b>解決之道（守成策略）：</b>此十年並非福報消失，而是能量轉為「收束與考驗」。建議採取「鎖定資產」方針——將流動資金轉為不動產或長期保值品，避免擴張性投機。以防守代替進攻，先天之祿的基底仍在，待大限轉過後再行衝刺。`
        });
    }
    if (yJiPalace && yJiPalace === bLuPalace) {
        const bLuStar = bFly.祿.star;
        const yJiStar = yFly.忌.star;
        const sem = PALACE_SEMANTICS[bLuPalace];
        conflicts.push({
            type: 'lu_destroyed_year',
            severity: 'warning',
            msg: `🟡 【矛盾（流年）：流年忌觸動生年祿】` +
                 `<br>流年忌（${yJiStar}忌）落入生年祿宮【${bLuPalace}】，今年先天福報被觸動考驗。` +
                 `<br>▶ 論斷：今年是生命中「福報接受測試」的一年，${sem?.domain || bLuPalace}相關事務需謹慎，勿在此年冒進。<br><br>💡 <b>解決之道（年內謹守）：</b>今年是生命中「福報接受測試」的一年。建議低調行事，避免在此年簽訂重要合約或大額投資，靜待流年過去後再出手。`
        });
    }

    // 2. 祿忌往來（命與六親宮的深層對待）
    //    A飛忌入B，B飛祿回A → 「我傷你，你卻仍愛我」的深刻糾纏
    //    A飛祿入B，B飛忌入A → 「我付出，你卻給我壓力」
    const sixP = ['命宮','財帛宮','官祿宮','夫妻宮','福德宮','田宅宮','父母宮','子女宮'];
    for (const nameA of sixP) {
        for (const nameB of sixP) {
            if (nameA === nameB) continue;
            const pA = allPalaces.find(p => p.name === nameA);
            const pB = allPalaces.find(p => p.name === nameB);
            if (!pA || !pB) continue;
            const flyA = computeFly(allPalaces, pA.gan);
            const flyB = computeFly(allPalaces, pB.gan);
            const semA = PALACE_SEMANTICS[nameA];
            const semB = PALACE_SEMANTICS[nameB];

            // A飛忌入B，B飛祿回A（最深刻的糾纏）
            if (flyA.忌.targetPalace === nameB && flyB.祿.targetPalace === nameA) {
                conflicts.push({
                    type: 'ji_lu_mutual',
                    severity: 'notable',
                    msg: `💜 【矛盾：祿忌往來糾纏──${nameA}忌→${nameB}、${nameB}祿→${nameA}】` +
                         `<br>${nameA}飛忌入${nameB}，代表「${semA?.self || nameA}對${semB?.self || nameB}施加壓力或傷害」；` +
                         `<br>但${nameB}卻飛祿回${nameA}，代表「${semB?.self || nameB}仍主動向${semA?.self || nameA}付出滋養」。` +
                         `<br>▶ 論斷：這是命盤中深刻的「恩怨共生」結構。${semA?.domain || nameA}傷了${semB?.domain || nameB}，` +
                         `但${semB?.domain || nameB}卻無怨反哺。此格局常見於難以割捨的感情糾葛、血濃於水的家族連結，或難分難解的合夥關係。<br><br>💡 <b>解決之道（主動補償）：</b>化解恩怨共生的關鍵在於「有形補償」——對被你施壓的宮位（人事物）主動給予超額的實質回饋（金錢、時間或關懷），以補足能量缺口，防止關係崩解。人為干預能量流向，是破除因果迴圈的唯一方法。`
                });
            }

            // A飛祿入B，B飛忌入A（付出卻受壓）
            if (flyA.祿.targetPalace === nameB && flyB.忌.targetPalace === nameA) {
                conflicts.push({
                    type: 'lu_ji_mutual',
                    severity: 'notable',
                    msg: `🟠 【矛盾：祿往忌來──${nameA}祿→${nameB}、${nameB}忌→${nameA}】` +
                         `<br>${nameA}主動飛祿滋養${nameB}（${semA?.self}對${semB?.self}付出），` +
                         `但${nameB}卻飛忌回壓${nameA}（${semB?.self}的問題轉移至${semA?.self}）。` +
                         `<br>▶ 論斷：「我對你好，你卻給我添麻煩」的能量結構。付出與回報嚴重不對等，` +
                         `${semA?.domain || nameA}方面愈投入，受到的${semB?.domain || nameB}反噬愈深。<br><br>💡 <b>解決之道（主動補償）：</b>化解恩怨共生的關鍵在於「有形補償」——對被你施壓的宮位（人事物）主動給予超額的實質回饋（金錢、時間或關懷），以補足能量缺口，防止關係崩解。人為干預能量流向，是破除因果迴圈的唯一方法。`
                });
            }
        }
    }

    // 3. 體用不位（六親宮 vs 物質宮的衝突）
    //    生年四化（體）偏向六親宮（命夫子兄），大限四化（用）偏向物質宮（財官田福）
    //    或反之 → 「情感與利益的衝突」
    const emotionalPalaces = ['命宮','夫妻宮','子女宮','兄弟宮','父母宮'];
    const materialPalaces  = ['財帛宮','官祿宮','田宅宮','福德宮'];

    const bLuType = emotionalPalaces.includes(bLuPalace) ? 'emotional' :
                    materialPalaces.includes(bLuPalace)  ? 'material' : 'other';
    const bJiType = emotionalPalaces.includes(bJiPalace) ? 'emotional' :
                    materialPalaces.includes(bJiPalace)  ? 'material' : 'other';

    if (dxFly) {
        const dxLuType = emotionalPalaces.includes(dxLuPalace) ? 'emotional' :
                         materialPalaces.includes(dxLuPalace)  ? 'material' : 'other';
        const dxJiType = emotionalPalaces.includes(dxJiPalace) ? 'emotional' :
                         materialPalaces.includes(dxJiPalace)  ? 'material' : 'other';

        // 生年祿在物質宮，大限忌在六親宮（先天愛財，此限傷情）
        if (bLuType === 'material' && dxJiType === 'emotional') {
            conflicts.push({
                type: 'material_vs_emotional',
                severity: 'notable',
                msg: `🔵 【矛盾：體用不位──先天愛財，此限傷情】` +
                     `<br>生年祿在【${bLuPalace}】（物質宮），顯示先天命格的核心福祿在物質財務層面；` +
                     `<br>大限忌卻落在【${dxJiPalace}】（六親宮），此十年的考驗集中在人際感情層面。` +
                     `<br>▶ 論斷：此十年面臨「錢賺得到，情卻留不住」的核心矛盾。` +
                     `事業財務雖有先天優勢，卻在這段歲月中為六親感情付出慘重代價。`
            });
        }
        // 生年祿在六親宮，大限忌在物質宮（先天重情，此限傷財）
        if (bLuType === 'emotional' && dxJiType === 'material') {
            conflicts.push({
                type: 'emotional_vs_material',
                severity: 'notable',
                msg: `🔵 【矛盾：體用不位──先天重情，此限傷財】` +
                     `<br>生年祿在【${bLuPalace}】（六親宮），先天命格的福祿落在人際感情層面；` +
                     `<br>大限忌卻落在【${dxJiPalace}】（物質宮），此十年考驗集中在財務物質層面。` +
                     `<br>▶ 論斷：此十年面臨「情有了，財卻散了」的核心矛盾。` +
                     `人緣貴人雖好，卻在這段歲月中財務事業受到重大考驗，需以情換財。<br><br>💡 <b>解決之道（跨界轉化）：</b>建立「時間防火牆」與「儀式感回饋」——強制規定無手機家庭日，並將賺得的物質成果精準轉化為家庭保障與共同體驗。用物質的厚度補償時間的稀缺，承認代價的存在並有意識地補救。`
            });
        }
    }

    // 過濾重複（祿忌往來可能產生過多條目）
    const seen = new Set();
    return conflicts.filter(c => {
        const k = c.type + c.msg.substring(0, 30);
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
    });
}

// 疾厄宮的遺傳連動（父母宮）與氣數位（兄弟宮）分析
function analyzeJieEr(allPalaces, bGan, dxGan, yGan, gender) {
    const jie   = allPalaces.find(p => p.name === '疾厄宮');
    const fumu  = allPalaces.find(p => p.name === '父母宮');   // 遺傳宮
    const xiong = allPalaces.find(p => p.name === '兄弟宮');   // 氣數位（疾厄第九宮）
    if (!jie) return { sections: [], huaSection: '', linkageSection: '' };

    const bSh = SIHUA[bGan];
    const dxSh = dxGan ? SIHUA[dxGan] : null;
    const ySh  = SIHUA[yGan];

    const jieFly  = computeFly(allPalaces, jie.gan);
    const fumuFly = fumu ? computeFly(allPalaces, fumu.gan) : null;

    // ── 1. 疾厄宮主星分析（含宮性加成） ──
    const sections = [];
    const mainStars = jie.stars.m;

    if (mainStars.length === 0) {
        // 借對宮（父母宮）
        const opp = allPalaces.find(p => p.index === (jie.index + 6) % 12);
        sections.push(`疾厄宮無主星，借對宮【${opp ? opp.name : '父母宮'}】論：` +
            `${opp ? opp.stars.m.join('、') || '亦無主星' : ''}，以對宮星性判斷體質。`);
    } else {
        mainStars.forEach(s => {
            const info = getStarInfo(s);
            const feat = getStarFeature(s);
            if (!info) return;
            const _typeNote = info.type ? ` <span style="color:#888;font-size:10px;">[${info.type}]</span>` : '';
            let line = `<b>${s}</b>${_typeNote}坐疾厄（主${getOrgans(s, gender)}）`;
            // 三層四化影響
            const tags = [];
            for (const k of SH_KEYS) {
                if (bSh[k] === s)           tags.push(`生年${k}`);
                if (dxSh && dxSh[k] === s) tags.push(`大限${k}`);
                if (ySh[k] === s)           tags.push(`流年${k}`);
            }
            if (tags.length) {
                line += `【${tags.join('、')}】`;
                // 逐一說明四化對此星臟腑的影響
                tags.forEach(t => {
                    const k = t.replace('生年','').replace('大限','').replace('流年','');
                    if (k === '忌' && getHealthJi(s, gender)) {
                        line += `<br>　⚠ ${t}：${getHealthJi(s, gender)}`;
                    } else if (k === '祿' && feat) {
                        line += `<br>　✦ ${t}：${feat.huaEffect['祿'].substring(0, 40)}…（健康層面：體態易豐腴，養生機緣佳）`;
                    } else if (k === '權' && feat) {
                        line += `<br>　● ${t}：${feat.huaEffect['權'].substring(0, 40)}…（健康層面：功能亢進，需防過度透支）`;
                    } else if (k === '科' && feat) {
                        line += `<br>　◆ ${t}：${feat.huaEffect['科'].substring(0, 40)}…（健康層面：有名醫緣，慢性病可調控）`;
                    }
                });
            } else {
                line += `（無三層四化直接引動，以星性本質論體質）<br><br>💡 <b>解決之道（主動補償）：</b>化解恩怨共生的關鍵在於「有形補償」——對被你施壓的宮位（人事物）主動給予超額的實質回饋（金錢、時間或關懷），以補足能量缺口，防止關係崩解。人為干預能量流向，是破除因果迴圈的唯一方法。`;
            }
            sections.push(line);
        });
    }

    // ── 2. 疾厄宮四化特性（宮干飛化產生的宮性） ──
    let huaSection = `<b>疾厄宮（${jie.gan}干）宮性四化分析</b>：<br>`;

    // 判斷疾厄宮干產生哪些化
    const jieSh = SIHUA[jie.gan];
    if (jieSh) {
        for (const k of ['祿','權','科','忌']) {
            const analysis = JIE_HUA_ANALYSIS[k];
            const starName = jieSh[k];
            // 只有當此星真的在疾厄宮，才是疾厄宮直接化出（宮位飛化）
            const starInJie = [...jie.stars.m, ...jie.stars.a].includes(starName);
            if (starInJie) {
                // 自化！
                huaSection += `<span style="color:#e67e22">⟳ 疾厄自化${k}（${starName}）</span>──`;
            } else {
                huaSection += `疾厄宮飛${k}（${starName}）→【${jieFly[k].targetPalace}】──`;
            }
            huaSection += `${analysis.label}<br>`;
        }
        huaSection += '<br>';
    }

    // 判斷三層四化「飛入疾厄」的化性，套用深化解讀
    const incomingHua = [];
    const layers = [
        { gan: bGan, label: '生年（體）' },
        { gan: dxGan, label: '大限（用）' },
        { gan: yGan,  label: '流年（出）' },
    ].filter(l => !!l.gan);

    for (const { gan, label } of layers) {
        const fly = computeFly(allPalaces, gan);
        for (const k of SH_KEYS) {
            if (fly[k].targetPalace === '疾厄宮') {
                incomingHua.push({ label, k, star: SIHUA[gan][k], gan });
            }
        }
    }

    if (incomingHua.length) {
        huaSection += `<u>飛入疾厄宮的四化（${incomingHua.length}項）</u>：<br>`;
        incomingHua.forEach(({ label, k, star }) => {
            const analysis = JIE_HUA_ANALYSIS[k];
            const colorMap = { 祿:'var(--lu)', 權:'var(--quan)', 科:'var(--ke)', 忌:'var(--ji)' };
            huaSection += `<b><span style="color:${colorMap[k]}">${label}${k}（${star}）入疾厄</span></b>：`;
            huaSection += `${analysis.bodyStyle}<br>`;
            huaSection += `<span style="font-size:11px;color:#666">病理特徵：${analysis.pathology[0]}</span><br>`;
            huaSection += `<span style="font-size:11px;color:${k==='忌'?'#c0392b':'#2c7a4f'}">`;
            huaSection += k === '忌' ? `⚠ 警示：${analysis.warning}` : `✦ 優勢：${analysis.advantage}`;
            huaSection += `</span><br>`;

            // 化科壓制化忌（許老師最重要的動態解讀之一）
            if (k === '科') {
                const hasJiInJie = incomingHua.some(i => i.k === '忌' && i.label !== label);
                const jieMainHasJi = mainStars.some(s =>
                    [bGan, dxGan, yGan].filter(Boolean).some(g => SIHUA[g]?.['忌'] === s)
                );
                if (hasJiInJie || jieMainHasJi) {
                    huaSection += `<b style="color:var(--jade)">★ 化科壓制化忌：此層化科傳入疾厄，對宮中已存在的忌壓形成制衡，` +
                        `化險為夷之象，可能在此期間遇到良醫或找到有效的治療方向，逢凶化吉。</b><br>`;
                }
            }
            huaSection += '<br>';
        });
    } else {
        huaSection += `（三層四化目前無直接飛入疾厄宮，疾厄宮以宮干本質與坐星論健康。）<br>`;
    }

    // ── 3. 父母宮（遺傳）+ 兄弟宮（氣數位）聯動 ──
    let linkageSection = `<u>★ 遺傳宮（父母）與氣數位（兄弟）聯動分析</u>：<br>`;

    if (fumu) {
        const fumuSh = SIHUA[fumu.gan];
        linkageSection += `<b>父母宮（${fumu.gan}干）── 遺傳體質基礎</b>：<br>`;
        if (fumuSh) {
            const fumuFlyResult = computeFly(allPalaces, fumu.gan);
            // 父母宮飛忌入疾厄 = 遺傳性疾病警訊
            if (fumuFlyResult.忌.targetPalace === '疾厄宮') {
                const fumuJiStar = fumuSh['忌'];
                const starInfo = getStarInfo(fumuJiStar);
                linkageSection += `<b style="color:var(--quan)">⚠ 父母宮飛忌（${fumuJiStar}）入疾厄宮：遺傳性疾病警訊！</b><br>`;
                if (starInfo) linkageSection += `　${fumuJiStar}主${getOrgans(fumuJiStar, gender)}，家族可能有相關疾病史，需特別關注：${getHealthJi(fumuJiStar, gender)}<br>`;
            }
            // 父母宮飛祿入疾厄 = 遺傳良好體質
            if (fumuFlyResult.祿.targetPalace === '疾厄宮') {
                linkageSection += `✦ 父母宮飛祿入疾厄：遺傳體質良好，先天底子不錯，即便有病也容易復原。<br>`;
            }
            // 父母宮飛科入疾厄 = 有名醫貴人緣（遺傳層面）
            if (fumuFlyResult.科.targetPalace === '疾厄宮') {
                linkageSection += `◆ 父母宮飛科入疾厄：家族有養生智慧或醫療資源的傳承，遺傳層面的健康管理能力強。<br>`;
            }
            // 三層四化打到父母宮（遺傳基因受衝擊）
            incomingHua.forEach(({ label, k }) => {
                if (k === '忌' && fumuFlyResult?.忌?.targetPalace === '疾厄宮') {
                    linkageSection += `⚠ ${label}忌亦激活父母宮的遺傳忌線，此期遺傳性疾病風險升高。<br>`;
                }
            });
        }
        linkageSection += '<br>';
    }

    if (xiong) {
        const xiongSh = SIHUA[xiong.gan];
        linkageSection += `<b>兄弟宮（${xiong.gan}干）── 疾厄氣數位（第九宮）</b>：<br>`;
        linkageSection += `兄弟宮是疾厄宮的氣數位，代表「疾厄事務背後的環境支撐與阻力」。<br>`;
        if (xiongSh) {
            const xiongFlyResult = computeFly(allPalaces, xiong.gan);
            if (xiongFlyResult.忌.targetPalace === '疾厄宮') {
                const xiongJiStar = xiongSh['忌'];
                linkageSection += `<b style="color:var(--quan)">⚠ 兄弟宮飛忌（${xiongJiStar}）入疾厄（氣數位施壓）：</b><br>`;
                linkageSection += `　就醫或治療過程的環境存在阻力──可能是醫療資源不足、診斷不易、或治療過程充滿波折，` +
                    `即便本人體質尚可，求醫過程卻費心費力。<br>`;
            }
            if (xiongFlyResult.祿.targetPalace === '疾厄宮') {
                linkageSection += `✦ 兄弟宮飛祿入疾厄（氣數位助力）：治療環境順暢，就醫方便，手足或身邊的人也能給予健康上的幫助。<br>`;
            }
            // 三層四化衝擊兄弟宮（氣數位）
            for (const { gan, label } of layers) {
                const fly = computeFly(allPalaces, gan);
                if (fly.忌.targetPalace === '兄弟宮') {
                    linkageSection += `⚠ ${label}忌落兄弟宮（疾厄氣數位）：此期就醫環境阻力最大，治療過程最曲折，需格外主動積極。<br>`;
                }
                if (fly.祿.targetPalace === '兄弟宮') {
                    linkageSection += `✦ ${label}祿落兄弟宮（疾厄氣數位）：此期就醫環境最順，貴人醫師最易出現。<br>`;
                }
            }
        }
    }

    // ── 4. 組合格局警示 ──
    const comboSection = analyzeJieCombo(jie, allPalaces, bGan, dxGan, yGan, incomingHua, gender);

    return { sections, huaSection, linkageSection, comboSection };
}

function analyzeJieCombo(jie, allPalaces, bGan, dxGan, yGan, incomingHua, gender) {
    let result = `<u>★ 疾厄宮特殊格局偵測</u>：<br>`;
    const jieSha = hasMaleficInPalace(jie);
    const mainStars = jie.stars.m;
    let found = false;

    const hasIncoming = (k) => incomingHua.some(i => i.k === k);
    const hasIncomingLabel = (k, label) => incomingHua.some(i => i.k === k && i.label.includes(label));

    // 祿權相逢
    if (hasIncoming('祿') && hasIncoming('權')) {
        found = true;
        result += `⚡ <b>祿權相逢入疾厄</b>：體質壯碩能幹，但需防「能幹之人死於不知停歇」──過度透支帶來的多重並發症風險高，40歲後應主動降速。<br>`;
    }
    // 科祿同宮
    if (hasIncoming('祿') && hasIncoming('科')) {
        found = true;
        result += `🌟 <b>科祿同入疾厄</b>：命盤最佳健康格局，心態好、有名醫緣，屬「有福氣的病人」，即便有疾，得藥甚速。<br>`;
    }
    // 化科壓制化忌（跨層）
    if (hasIncoming('科') && hasIncoming('忌')) {
        found = true;
        const sciLabel = incomingHua.find(i => i.k === '科')?.label || '';
        const jiLabel  = incomingHua.find(i => i.k === '忌')?.label || '';
        result += `★ <b>化科壓制化忌</b>（${sciLabel}科 v.s. ${jiLabel}忌）：忌代表的病患壓力，受到科的制衡，` +
            `化險為夷，尤其${sciLabel}期間可遇良醫或找到有效療法，是疾厄中最珍貴的解厄力量。<br>`;
    }
    // 疾厄自化忌
    const selfTrans = jie.getSelfTransformations ? jie.getSelfTransformations() : [];
    const hasSelfJi = selfTrans.some(s => s.type === '忌');
    if (hasSelfJi) {
        found = true;
        const selfJiStar = selfTrans.find(s => s.type === '忌')?.star;
        result += `⚠ <b>疾厄自化忌（${selfJiStar}）</b>：疾厄宮健康能量持續向外洩散，體力難以積累，` +
            `就算外來有祿科補充，效果也會打折。養生重點在「固本」──規律作息、避免長期慢性消耗。<br>`;
    }
    // 疾厄逢四煞
    if (jieSha.length >= 2) {
        found = true;
        result += `⚠ <b>疾厄多煞（${jieSha.join('、')}）</b>：體質偏弱且易有意外傷損，建議定期做全身健檢，並注意居家與出行安全。<br>`;
    } else if (jieSha.length === 1) {
        result += `● 疾厄見${jieSha[0]}：體質有偏弱傾向，宜建立規律養生習慣。<br>`;
    }
    // 三疊忌入疾厄
    const tripleJi = incomingHua.filter(i => i.k === '忌').length >= 2;
    if (tripleJi) {
        found = true;
        result += `🔴 <b>多層忌星疊入疾厄</b>：體用出多層同時對疾厄施壓，此為命盤健康最高危期，須以具體行動（就醫、改善作息、減輕壓力源）積極應對，切勿消極等待。<br>`;
    }

    if (!found) result += `（疾厄宮目前無重大組合格局被偵測到，體質狀況相對平穩。）<br>`;
    return result;
}

    const lines = [];

    const dxFly = computeFly(allPalaces, dxGan);

    const dxSh  = SIHUA[dxGan];
    const ySh   = SIHUA[yGan];

    if (dxFly.科.targetPalace === '夫妻宮') {
        lines.push(`✦ 大限科（${dxSh?.科}）入夫妻──此十年婚姻有貴人緣解厄，即便有波折也能化險為夷；感情中容易遇到「良師型」的伴侶或因才名與貴人引薦而結緣。`);

        lines.push(`● 大限權（${dxSh?.權}）入夫妻──此十年感情中主導欲強，易因控制或主導衝突而影響關係，但也代表有能力主動推進感情走向。`);
    }
    // 流年科入夫妻
    if (yFly.科.targetPalace === '夫妻宮') {
        lines.push(`✦ 流年科（${ySh?.科}）入夫妻──今年感情有解厄力量，即便面臨忌壓（若同時有忌），科能化解衝突為良機。`);
    }

    // 「科祿照」組合：大限祿+流年科 或 大限科+流年祿 入夫妻
    const dxLuInFu = dxFly.祿.targetPalace === '夫妻宮';
    const yKeInFu  = yFly.科.targetPalace === '夫妻宮';
    const dxKeInFu = dxFly.科.targetPalace === '夫妻宮';
    const yLuInFu  = yFly.祿.targetPalace === '夫妻宮';
    if ((dxLuInFu && yKeInFu) || (dxKeInFu && yLuInFu)) {
        lines.push(`🌟 大限＋流年「祿科照夫妻」：雙重吉化同時照耀婚姻宮，是命盤中婚姻最幸福的年份，此期間的感情決定（結婚、和解、深化承諾）具有長遠的正面效應。`);
    }

    // 雙忌夾攻（大限忌+流年忌同入夫妻）
    const dxJiInFu = dxFly.忌.targetPalace === '夫妻宮';
    const yJiInFu  = yFly.忌.targetPalace === '夫妻宮';
    if (dxJiInFu && yJiInFu) {
        lines.push(`⚠⚠ 大限忌＋流年忌雙疊入夫妻：婚姻能量雙重受壓，是感情最高危的年份組合。此年務必採取「主動防禦」而非被動等待：提前安排婚姻諮商、增加共同活動、避免長期分離。`);

    return lines;
}

// ── 主引擎：整合五大模組 ──────────────────────────────────────────
function analyzeMarriageDeep(allPalaces, bGan, dxGan, yGan, gender) {
    const fuqi = allPalaces.find(p => p.name === '夫妻宮');
    if (!fuqi) return { starAdvice: '', mutual: [], causeEffect: '', crises: [], dynamic: [] };

    // A. 主星溝通處方籤
    let starAdvice = '';
    const mainStars = fuqi.stars.m;
    mainStars.forEach(s => {
        const adv = MARRIAGE_STAR_ADVICE[s];
        if (!adv) return;
        starAdvice += `<b>【${s}坐夫妻】</b><br>`;
        starAdvice += `　性格：${adv.character}<br>`;
        starAdvice += `　<b style="color:var(--jade)">溝通處方：${adv.communication}</b><br>`;
        starAdvice += `　衝突風格：${adv.conflict_style}<br>`;
        starAdvice += `　愛的語言：${adv.love_style}<br><br>`;
    });
    if (!mainStars.length) {
        const opp = allPalaces.find(p => p.index === (fuqi.index + 6) % 12);
        if (opp) {
            opp.stars.m.forEach(s => {
                const adv = MARRIAGE_STAR_ADVICE[s];
                if (!adv) return;
                starAdvice += `<b>【${s}照夫妻（借對宮論）】</b><br>`;
                starAdvice += `　性格：${adv.character}<br>`;
                starAdvice += `　<b style="color:var(--jade)">溝通處方：${adv.communication}</b><br><br>`;
            });
        }
    }

    // B. 命夫雙向互動
    const mutual = analyzeMingFuMutual(allPalaces, bGan, dxGan, yGan, gender);

    // C. 衝突根源
    const causeEffect = analyzeFuCauseEffect(allPalaces, fuqi);

    // D. 危機預警
    const crises = analyzeFuCrisis(allPalaces, fuqi, bGan, dxGan, yGan);

    // E. 大限流年動態
    const dynamic = analyzeFuDynamic(allPalaces, fuqi, dxGan, yGan);

    return { starAdvice, mutual, causeEffect, crises, dynamic };
}

/**
 * 純主星性別機率計算（依 14 主星 7:7 陰陽分配）
 * @param {Array} stars - 主星陣列
 * @returns {{ male: number, female: number }}
 */
function calculatePureGenderProbability(stars) {
    let mScore = 0, fScore = 0;
    stars.forEach(s => {
        if (CHILD_YIN_YANG.yang.stars.includes(s)) mScore++;
        if (CHILD_YIN_YANG.yin.stars.includes(s))  fScore++;
    });
    const total = mScore + fScore;
    if (total === 0) return { male: 50, female: 50 };
    return {
        male:   Math.round((mScore / total) * 100),
        female: Math.round((fScore / total) * 100)
    };
}

/**
 * 高階性別機率平衡引擎（支援空宮借對宮・地支中立後備）
 * @param {Object} palace         - 子女宮物件
 * @param {Object} opponentPalace - 對宮（田宅宮）物件
 * @returns {{ male: number, female: number, source: string }}
 */
function getBalancedGenderChance(palace, opponentPalace) {
    const mainStars = palace.stars.m || [];

    // 1. 有主星：依 14主星 7:7 直接計算
    if (mainStars.length > 0) {
        const r = calculatePureGenderProbability(mainStars);
        return { ...r, source: `本宮主星（${mainStars.join('、')}）` };
    }

    // 2. 空宮：借對宮主星
    const oppStars = opponentPalace?.stars?.m || [];
    if (oppStars.length > 0) {
        const r = calculatePureGenderProbability(oppStars);
        return { ...r, source: `借對宮（${opponentPalace.name}）主星（${oppStars.join('、')}）` };
    }

    // 3. 對宮亦空：依子女宮地支陰陽給輕微傾向
    const yangZhi = new Set(['子','寅','辰','午','申','戌']);
    const isMale  = yangZhi.has(palace.dz);
    return {
        male:   isMale ? 58 : 42,
        female: isMale ? 42 : 58,
        source: `地支「${palace.dz}」${isMale ? '（陽支偏男）' : '（陰支偏女）'}，主星皆缺，以地支陰陽給予輕微傾向`
    };
}

// ================================================================
//  ★ 生女懷孕時機掃描引擎
//  依曾大師理則：陰性地支 × 陰性星曜 × 化科/化忌引動
//  掃描 birthYear+適育年齡 → 給出「生女因緣分數」最高的前三個年份
//  同時提供「月份建議」（秋冬陰氣較重 = 辰未戌丑月）
// ================================================================

// 陰陽星曜分類（子女宮脈絡）
const CHILD_GENDER_STARS = {
    yinStars: new Set(['太陰','天同','天機','右弼','天鉞','破軍']),   // 偏女
    yangStars: new Set(['太陽','天府','天梁','左輔','天魁','天馬']),  // 偏男
};

// 陰性地支（子、午除外──子為陰陽極轉之地，單計1分）
const YIN_BRANCHES   = new Set(['丑','卯','巳','未','酉','亥']);
const YANG_BRANCHES  = new Set(['寅','辰','午','申','戌','子']);

// 化象性別傾向
//   化科：文靜秀麗，最利生女
//   化忌：收斂陰柔，生女傾向（但也代表波折，需注意保健）
//   化祿：擴散滋潤，中性偏陰（祿=天同天機屬陰）
//   化權：剛猛，偏男
const HUA_GENDER = { 科: 2, 忌: 1, 祿: 0.5, 權: -1 };

// 農曆「陰性月份」（秋冬：7-12月）
const YIN_LUNAR_MONTHS = [7,8,9,10,11,12];

/**
 * 計算「流年子女宮」（本命宮位上疊流年命）
 * 流年命宮 = 流年地支對應的宮位（地支與宮位一一對應）
 * 子女宮 = 流年命宮逆數第4格（命為1，逆行子女在第4）
 *
 * 紫微斗數流年子女宮定位：
 *   流年命宮地支確定後，逆數4格（含本宮），即子女宮
 *   等價：(流年地支索引 - 3 + 12) % 12
 *   再找到命盤中 dzIdx 等於此值的宮位
 */
function getFlowChildPalaceIdx(flowYearZhiIdx) {
    // 逆數：子(0)為流年命時，子女宮在酉(9)
    // 公式：(命dzIdx - 3 + 12) % 12
    return (flowYearZhiIdx - 3 + 12) % 12;
}

/**
 * 計算一個西元年份的「生女分數」
 * @param {number} westernYear 西元年
 * @param {Array}  palaces     本命宮位陣列
 * @param {string} bGan        生年天干（先天四化基礎）
 * @returns {{ score: number, reasons: string[], yearZhi: string, yearGan: string }}
 */
function calcGirlScore(westernYear, palaces, bGan) {
    const yearGan     = TIAN_GAN[(westernYear - 4) % 10];
    const yearZhiIdx  = (westernYear - 4) % 12;
    const yearZhi     = DI_ZHI[yearZhiIdx];
    const flowCIdx    = getFlowChildPalaceIdx(yearZhiIdx);
    const flowChild   = palaces.find(p => p.dzIdx === flowCIdx);
    if (!flowChild) return null;

    let score = 0;
    const reasons = [];

    // ── A. 流年子女宮地支陰陽 ──────────────────────────────────
    if (YIN_BRANCHES.has(flowChild.dz)) {
        score += 2;
        reasons.push(`流年子女宮落${flowChild.dz}（陰性地支）`);
    } else if (flowChild.dz === '子') {
        // 子為陽極陰始，各計1
        score += 1;
        reasons.push(`流年子女宮落子（陰陽交替）`);
    }

    // ── B. 宮內主星陰陽 ────────────────────────────────────────
    const mainStars = [...flowChild.stars.m, ...flowChild.stars.a];
    let yinStarCount = 0;
    mainStars.forEach(s => {
        if (CHILD_GENDER_STARS.yinStars.has(s)) {
            score += 1;
            yinStarCount++;
            reasons.push(`宮內陰性星「${s}」`);
        }
        if (CHILD_GENDER_STARS.yangStars.has(s)) {
            score -= 0.5;  // 陽性星扣分
        }
    });

    // ── C. 流年四化對子女宮主星的引動 ─────────────────────────
    const sh = SIHUA[yearGan];
    if (sh) {
        for (const k of ['科','忌','祿','權']) {
            const starOfHua = sh[k];
            // 流年四化星是否坐在「流年子女宮」
            if (mainStars.includes(starOfHua)) {
                const delta = HUA_GENDER[k];
                score += delta;
                if (k === '科')  reasons.push(`流年化科（${starOfHua}）入子女宮，最利生女`);
                if (k === '忌')  reasons.push(`流年化忌（${starOfHua}）入子女宮，陰性磁場強`);
                if (k === '祿')  reasons.push(`流年化祿（${starOfHua}）入子女宮，緣分旺（中性偏陰）`);
                if (k === '權')  reasons.push(`流年化權（${starOfHua}）入子女宮，陽性偏男`);
            }
        }
    }

    // ── D. 先天生年四化在子女宮的基礎加成 ─────────────────────
    const bSh = SIHUA[bGan];
    if (bSh) {
        if (mainStars.includes(bSh['科'])) {
            score += 1;
            reasons.push(`生年化科（${bSh['科']}）坐流年子女宮（先天加成）`);
        }
        if (mainStars.includes(bSh['忌'])) {
            score += 0.5;
            reasons.push(`生年化忌（${bSh['忌']}）坐流年子女宮（陰性磁場先天加成）`);
        }
    }

    // ── E. 流年天干本身的陰陽 ──────────────────────────────────
    // 天干陰：乙、丁、己、辛、癸
    const yinGan = new Set(['乙','丁','己','辛','癸']);
    if (yinGan.has(yearGan)) {
        score += 0.5;
        reasons.push(`流年天干${yearGan}屬陰`);
    }

    return { score, reasons, yearZhi, yearGan, flowChildDz: flowChild.dz, flowChildStars: mainStars };
}

/**
 * 主函式：掃描適育年齡（20-45歲），取「生女分數」前三高的年份
 * @param {Object} chartData 包含 lunarYear, daxianList, palaces
 * @param {string} bGan      生年天干
 * @param {number} currentWesternYear  當前流年西元年（或使用者輸入的流年）
 * @returns {string} HTML 報告
 */
function analyzeGirlConception(chartData, bGan, currentWesternYear) {
    const palaces     = chartData.palaces;
    const birthLunar  = chartData.lunarYear;   // solarToLunar 回傳的是西元年（如1983）
    const birthWestern = birthLunar;           // 直接使用，無需轉換

    // 掃描範圍：20歲到42歲（最寬鬆的生育年齡）
    const scanResults = [];
    for (let age = 20; age <= 42; age++) {
        const wy = birthWestern + age - 1;     // 虛歲轉西元（虛歲=出生年算1歲）
        const result = calcGirlScore(wy, palaces, bGan);
        if (!result) continue;

        // 取得對應大限
        const dx = getCurrentDaxian(chartData.daxianList, age);

        // 大限加成：大限子女宮（大限宮本宮的對宮為田宅，即田宅的氣數位加成）
        let dxBonus = 0;
        let dxNote  = '';
        if (dx) {
            const dxSh = SIHUA[dx.gan];
            if (dxSh) {
                // 大限化科/忌落在本命子女宮
                const nativeChild = palaces.find(p => p.name === '子女宮');
                if (nativeChild) {
                    const ncStars = [...nativeChild.stars.m, ...nativeChild.stars.a];
                    if (ncStars.includes(dxSh['科'])) { dxBonus += 1.5; dxNote = `大限化科（${dxSh['科']}）入本命子女宮`; }
                    if (ncStars.includes(dxSh['忌'])) { dxBonus += 0.5; dxNote += (dxNote?'＋':'') + `大限化忌（${dxSh['忌']}）入本命子女宮`; }
                    if (ncStars.includes(dxSh['祿'])) { dxBonus += 0.5; dxNote += (dxNote?'＋':'') + `大限化祿（${dxSh['祿']}）入本命子女宮`; }
                }
            }
        }

        scanResults.push({
            age,
            westernYear: wy,
            ...result,
            dxBonus,
            dxNote,
            totalScore: result.score + dxBonus,
            dx,
        });
    }

    // 取 totalScore 前三高（且 totalScore >= 2.5）
    const topThree = scanResults
        .filter(r => r.totalScore >= 2.5)
        .sort((a, b) => b.totalScore - a.totalScore)
        .slice(0, 3);

    let html = '';

    if (topThree.length === 0) {
        html += '（掃描 20–42 歲適育區間，未找到生女分數≥2.5的特別旺年。建議順其自然，以醫學手段為主要輔助。）<br>';
        return html;
    }

    // 免責聲明
    html += `<span style="color:#888;font-size:11px">⚠ 以下為傳統星象參考，屬趣味性探索，不可取代現代醫學判斷。</span><br><br>`;

    topThree.forEach((r, idx) => {
        const rankIcon = ['🥇','🥈','🥉'][idx];
        const scoreBar = '★'.repeat(Math.round(r.totalScore));
        const col = r.totalScore >= 4 ? 'var(--jade)' : (r.totalScore >= 3 ? 'var(--lu)' : '#888');

        html += `<b style="color:${col}">${rankIcon} 虛歲 ${r.age} 歲（西元 ${r.westernYear} 年・${r.yearGan}${r.yearZhi}年）</b><br>`;
        html += `　生女因緣分數：<b>${r.totalScore.toFixed(1)}</b> ${scoreBar}<br>`;

        // 流年子女宮情況
        html += `　流年子女宮落【${r.flowChildDz}】`;
        if (YIN_BRANCHES.has(r.flowChildDz)) html += `（陰性地支 ✦）`;
        if (r.flowChildStars.length) html += `，宮內見：${r.flowChildStars.join('、')}`;
        html += '<br>';

        // 分析依據
        if (r.reasons.length) {
            html += `　依據：${r.reasons.join('；')}<br>`;
        }
        // 大限加成
        if (r.dxNote) {
            html += `　大限加成：${r.dxNote}（+${r.dxBonus.toFixed(1)}分）<br>`;
        }
        if (r.dx) {
            html += `　大限：${r.dx.palaceName}（${r.dx.startAge}–${r.dx.endAge}歲）<br>`;
        }

        // 月份建議（化科最利秋冬，化忌需注意孕期保健）
        const hasKe  = r.reasons.some(s => s.includes('化科'));
        const hasJi  = r.reasons.some(s => s.includes('化忌'));
        html += `　<b style="color:var(--jade)">💡 月份建議：`;
        if (hasKe) {
            html += `農曆七至十二月（秋冬陰氣最重），尤以農曆九、十月（戌亥月）化科能量最純。`;
        } else if (hasJi) {
            html += `農曆秋冬季嘗試，化忌帶陰性磁場，但需注意孕期保健與情緒穩定。`;
        } else {
            html += `農曆秋冬季（七至十二月）陰氣較旺，與生女因緣最契合。`;
        }
        html += '</b><br>';

        // 特殊提示
        if (hasKe) {
            html += `　✨ 化科引動：此年陰性能量最純正，母親孕前建議多接觸藝文、保持情緒平和，順應化科「秀美」之氣。<br>`;
        }
        if (hasJi) {
            html += `　⚠ 化忌提醒：忌主「收斂」，生女磁場雖強，孕期需特別注意保健，避免情緒過度起伏。<br>`;
        }
        html += '<br>';
    });

    // 總體建議
    const bestYear = topThree[0];
    html += `<span style="color:var(--jade)"><b>綜合建議：</b>命盤中生女因緣最旺的時機為虛歲 <b>${bestYear.age}</b> 歲（${bestYear.westernYear} 年・${bestYear.yearGan}${bestYear.yearZhi}）。`;
    html += `「時點是氣數，心態是轉化」──許老師強調緣分可以積累，於建議年份以放鬆、喜悅的心情嘗試，遠比刻意追求更契合「科」的溫和之氣。</span>`;

    return html;
}

function getYearGanZhi(year) {
    const g = (year - 4) % 10;
    const z = (year - 4) % 12;
    return { gan: TIAN_GAN[g], zhi: DI_ZHI[z], ganIdx: g, zhiIdx: z };
}

// 宮位天干由年干 + 月份推算（五虎遁）
function getPalaceGan(yearGan, monthOrDzIdx) {
    // 五虎遁年上起月：甲己之年丙作首，乙庚之年戊為頭...
    const startMap = { 0:2, 1:4, 2:6, 3:8, 4:0, 5:2, 6:4, 7:6, 8:8, 9:0 };
    const yIdx = TG_INDEX[yearGan];
    const base = startMap[yIdx];
    // 寅=2 is the first month, so dz index 2 maps to offset 0
    const offset = ((monthOrDzIdx - 2) + 12) % 12;
    return TIAN_GAN[(base + offset) % 10];
}

// ================================================================
//  3. 命宮、身宮定位
// ================================================================
function getMingGongDz(lunarMonth, hourIdx) {
    // 命宮地支：正月在寅，順數至生月，再逆數至生時（子時算第0步）
    // 公式：(2 + month - 1 - hourIdx + 12) % 12
    const idx = ((2 + lunarMonth - 1 - hourIdx) % 12 + 12) % 12;
    return idx; // index into DI_ZHI
}

function getShenGongDz(lunarMonth, hourIdx) {
    // 身宮地支：正月在寅，順數至生月，再順數至生時（子時算第0步）
    // 公式：(2 + month - 1 + hourIdx) % 12
    const idx = (2 + lunarMonth - 1 + hourIdx) % 12;
    return idx;
}

// ================================================================
//  4. 安紫微星 (餘數定宮、商數定步法)
// ================================================================
// 「六五四三二，酉午亥辰丑」
// 餘數對應宮位表：
const ZIWEI_REMAINDER = {
    2: { 1: 1 },             // 水二局: 餘1=丑
    3: { 1: 4, 2: 1 },       // 木三局: 餘1=辰, 餘2=丑
    4: { 1: 11, 2: 4, 3: 1 },// 金四局: 餘1=亥, 餘2=辰, 餘3=丑
    5: { 1: 6, 2: 11, 3: 4, 4: 1 }, // 土五局: 餘1=午, 餘2=亥, 餘3=辰, 餘4=丑
    6: { 1: 5, 2: 6, 3: 0, 4: 7, 5: 9 }, // 火六局: 餘1=巳, 餘2=午, 餘3=子, 餘4=未, 餘5=酉
};

function getZiweiDz(lunarDay, juNum) {
    const quotient = Math.floor(lunarDay / juNum);
    const remainder = lunarDay % juNum;

    if (remainder === 0) {
        // 整除：從寅宮起走 quotient 步（寅算第1步）
        return (2 + quotient - 1) % 12;
    } else {
        if (quotient === 0) {
            // 商=0（日數 < 局數）：直接在餘數宮安紫微
            return ZIWEI_REMAINDER[juNum][remainder];
        } else {
            // 從餘數宮的前一宮起，走 quotient 步（起點算第1步）
            const remDzIdx = ZIWEI_REMAINDER[juNum][remainder];
            const startDzIdx = (remDzIdx + 1) % 12;
            return (startDzIdx + quotient - 1) % 12;
        }
    }
}

//  5. 十四主星安星
// ================================================================
// 紫微星系 (紫微, 天機, 太陽, 武曲, 天同, 廉貞)
function getZiweiGroup(ziweiDzIdx) {
    // Offsets from 紫微 position (counterclockwise)
    // 紫微→天機: -1, 空→太陽: -3, 武曲: -4, 天同: -5, 空→廉貞: -8
    return {
        '紫微': ziweiDzIdx,
        '天機': (ziweiDzIdx - 1 + 12) % 12,
        '太陽': (ziweiDzIdx - 3 + 12) % 12,
        '武曲': (ziweiDzIdx - 4 + 12) % 12,
        '天同': (ziweiDzIdx - 5 + 12) % 12,
        '廉貞': (ziweiDzIdx - 8 + 12) % 12,
    };
}

// 天府星系 (天府, 太陰, 貪狼, 巨門, 天梁, 七殺, 破軍, 天相)
function getTianfuGroup(ziweiDzIdx) {
    // 天府 mirrors 紫微: if 紫微 at dz, 天府 at (寅+寅 - dz) = (4 - dz)
    // Actually: 紫微與天府以寅-申軸對稱
    const tianfuIdx = (4 - ziweiDzIdx + 12) % 12;
    // The rest follow sequentially from 天府
    return {
        '天府': tianfuIdx,
        '太陰': (tianfuIdx + 1) % 12,
        '貪狼': (tianfuIdx + 2) % 12,
        '巨門': (tianfuIdx + 3) % 12,
        '天相': (tianfuIdx + 4) % 12,
        '天梁': (tianfuIdx + 5) % 12,
        '七殺': (tianfuIdx + 6) % 12,
        '破軍': (tianfuIdx + 10) % 12,
    };
}

// 文昌、文曲 (依出生時辰)
function getWenStars(hourIdx) {
    // 文昌：戌起子時逆行
    const wenchangIdx = (10 - hourIdx + 12) % 12;
    // 文曲：辰起子時順行
    const wenquIdx = (4 + hourIdx) % 12;
    return { '文昌': wenchangIdx, '文曲': wenquIdx };
}

// 左輔、右弼 (依農曆月)
function getZuoYou(lunarMonth) {
    // 左輔：辰起正月順行
    const zuofuIdx = (4 + lunarMonth - 1) % 12;
    // 右弼：戌起正月逆行
    const youbiIdx = (10 - lunarMonth + 1 + 12) % 12;
    return { '左輔': zuofuIdx, '右弼': youbiIdx };
}

        '乙': { '天魁': '子', '天鉞': '申' },
        '丙': { '天魁': '亥', '天鉞': '酉' },
        '丁': { '天魁': '亥', '天鉞': '酉' },
        '戊': { '天魁': '丑', '天鉞': '未' },
        '己': { '天魁': '子', '天鉞': '申' },
        '庚': { '天魁': '丑', '天鉞': '未' },
        '辛': { '天魁': '午', '天鉞': '寅' },
        '壬': { '天魁': '卯', '天鉞': '巳' },
        '癸': { '天魁': '卯', '天鉞': '巳' },
    };
    const t = table[yearGan];
    return { '天魁': DZ_INDEX[t['天魁']], '天鉞': DZ_INDEX[t['天鉞']] };
}

// 擎羊、陀羅、火星、鈴星
function getShaStars(yearGan, hourIdx) {
    // 擎羊：年干定位
    const qingyangTable = { '甲':'卯','乙':'辰','丙':'午','丁':'未','戊':'午','己':'未','庚':'酉','辛':'戌','壬':'子','癸':'丑' };
    // 陀羅：擎羊前一位
    const tuoluoTable = { '甲':'丑','乙':'寅','丙':'辰','丁':'巳','戊':'辰','己':'巳','庚':'未','辛':'申','壬':'戌','癸':'亥' };

    const qyIdx = DZ_INDEX[qingyangTable[yearGan]];
    const tlIdx = DZ_INDEX[tuoluoTable[yearGan]];

    // 火星 (依年支和時辰，簡化版：寅午戌年起丑，申子辰年起寅，巳酉丑年起卯，亥卯未年起酉)
    // 簡化：以時辰順行
    const huoxingBase = [2, 3, 1, 9]; // 寅午戌, 申子辰, 巳酉丑, 亥卯未
    const huoxingIdx = (1 + hourIdx) % 12; // simplified

    // 鈴星 (similar pattern, simplified)
    const lingxingIdx = (10 + hourIdx) % 12; // simplified

    return {
        '擎羊': qyIdx,
        '陀羅': tlIdx,
        '火星': huoxingIdx,
        '鈴星': lingxingIdx,
    };
}

// 地空、地劫 (依時辰)
function getDiKongJie(hourIdx) {
    // 地劫：亥起子時順行
    const dijieIdx = (11 + hourIdx) % 12;
    // 地空：亥起子時逆行
    const dikongIdx = (11 - hourIdx + 12) % 12;
    return { '地空': dikongIdx, '地劫': dijieIdx };
}

// 祿存 (依年干)
function getLucun(yearGan) {
    const table = { '甲':'寅','乙':'卯','丙':'巳','丁':'午','戊':'巳','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子' };
    return { '祿存': DZ_INDEX[table[yearGan]] };
}

// 天馬 (依年支)
function getTianma(yearZhi) {
    const table = { '寅':'申','申':'寅','巳':'亥','亥':'巳','子':'寅','午':'申','卯':'巳','酉':'亥','辰':'寅','戌':'申','丑':'亥','未':'巳' };
    return { '天馬': DZ_INDEX[table[yearZhi]] };
}

// ================================================================
//  7. 大限計算
// ================================================================
function getDaxianStart(juNum) {
    return juNum; // 大限起始歲數 = 五行局數 - simplified: actually ju number + some offset
    // Typically: 水二局起2歲, 木三局起3歲, etc.
}

function getDaxianDirection(yearGanIdx, gender) {
    // 陽男陰女順行，陰男陽女逆行
    const isYangGan = (yearGanIdx % 2 === 0);
    const isMale = (gender === 'M');
    return (isYangGan === isMale) ? 1 : -1; // 1=順, -1=逆
}

// ================================================================
//  8. MASTER: 完整排盤
// ================================================================
function calculateChart(lunarYear, lunarMonth, lunarDay, hourIdx, gender, isLeap) {
    const yearGZ = getYearGanZhi(lunarYear);
    const yearGan = yearGZ.gan;
    const yearZhi = yearGZ.zhi;

    // If leap month and month > 15th day, treat as next month for some schools
    let effectiveMonth = lunarMonth;

    // 1. 命宮地支
    const mingDzIdx = getMingGongDz(effectiveMonth, hourIdx);
    const shenDzIdx = getShenGongDz(effectiveMonth, hourIdx);

    // 2. 命宮天干 (五虎遁)
    const mingGan = getPalaceGan(yearGan, mingDzIdx);

    // 3. 五行局
    const juNum = getWuxingJu(mingGan, DI_ZHI[mingDzIdx]);

    // 4. 十二宮排列（使用 Palace 物件類別）
    const palaces = [];
    for (let i = 0; i < 12; i++) {
        const actualDzIdx = (mingDzIdx - i + 12) % 12;
        const pGan = getPalaceGan(yearGan, actualDzIdx);
        const p = new Palace(i, actualDzIdx, pGan);
        p.isMing = (i === 0);
        p.isShen = (actualDzIdx === shenDzIdx);
        palaces.push(p);
    }

    // 5. 安紫微星
    const ziweiDzIdx = getZiweiDz(lunarDay, juNum);

    // 6. 安十四主星
    const ziweiGroup = getZiweiGroup(ziweiDzIdx);
    const tianfuGroup = getTianfuGroup(ziweiDzIdx);
    const mainStars = { ...ziweiGroup, ...tianfuGroup };

    // Place main stars
    for (const [star, dzIdx] of Object.entries(mainStars)) {
        const p = palaces.find(pp => pp.dzIdx === dzIdx);
        if (p) p.stars.m.push(star);
    }

    // 7. 輔助星
    const wenStars = getWenStars(hourIdx);
    const zuoyou = getZuoYou(effectiveMonth);
    const kuiyue = getKuiYue(yearGan);
    const lucun = getLucun(yearGan);
    const tianma = getTianma(yearZhi);

    const assistStars = { ...wenStars, ...zuoyou, ...kuiyue, ...lucun, ...tianma };
    for (const [star, dzIdx] of Object.entries(assistStars)) {
        const p = palaces.find(pp => pp.dzIdx === dzIdx);
        if (p) p.stars.a.push(star);
    }

    // 8. 煞星
    const shaStars = getShaStars(yearGan, hourIdx);
    const dikj = getDiKongJie(hourIdx);
    const badStars = { ...shaStars, ...dikj };
    for (const [star, dzIdx] of Object.entries(badStars)) {
        const p = palaces.find(pp => pp.dzIdx === dzIdx);
        if (p) p.stars.b.push(star);
    }

    // 9. 大限
    // 順行：從命宮往地支增加方向（子→丑→寅→...）
    // 逆行：從命宮往地支減少方向（子→亥→戌→...）
    const daxianStart = juNum;
    const daxianDir = getDaxianDirection(yearGZ.ganIdx, gender);

    const daxianList = []; // ordered list of daxian periods
    for (let i = 0; i < 12; i++) {
        const idx = (mingDzIdx + daxianDir * (i + 1) + 120) % 12;
        const p = palaces.find(pp => pp.dzIdx === idx);
        if (p) {
            const startAge = daxianStart + i * 10;
            const endAge = startAge + 9;
            p.daxian = `${startAge}-${endAge}`;
            p.daxianStart = startAge;
            p.daxianEnd = endAge;
            daxianList.push({ palaceName: p.name, dz: p.dz, gan: p.gan, dzIdx: idx, startAge, endAge });
        }
    }

    return {
        yearGan, yearZhi, mingDzIdx, shenDzIdx,
        mingGan, juNum, palaces,
        ziweiDzIdx, lunarYear: lunarYear,
        lunarMonth: lunarMonth, hourIdx: hourIdx,
        daxianDir: daxianDir > 0 ? '順行' : '逆行',
        daxianList,
        mainStarsMap: mainStars,
        assistStarsMap: assistStars,
        gender,
    };
}

// ================================================================
//  GRID LAYOUT: Map 12 palaces to 4x4 grid positions
// ================================================================
// Standard layout:
//  巳(5)  午(6)  未(7)  申(8)
//  辰(4)  [center]       酉(9)
//  卯(3)  [center]       戌(10)
//  寅(2)  丑(1)  子(0)  亥(11)
const GRID_ORDER = [5, 6, 7, 8, 4, -1, -2, 9, 3, -3, -4, 10, 2, 1, 0, 11];
// -1 = first center cell (render), -2/-3/-4 = skip

function palaceByDz(palaces, dzIdx) {
    return palaces.find(p => p.dzIdx === dzIdx);
}

// ================================================================
//  FLYING PALACE ENGINE (from previous version)
// ================================================================
function findStarInPalaces(palaces, starName) {
    for (const p of palaces) {
        const all = [...p.stars.m, ...p.stars.a, ...p.stars.b, ...p.stars.minor];
        if (all.includes(starName)) return p;
    }
    return null;
}

function computeFly(palaces, gan) {
    const sh = SIHUA[gan];
    if (!sh) return null;
    const result = {};
    for (const k of SH_KEYS) {
        const star = sh[k];
        const target = findStarInPalaces(palaces, star);
        result[k] = { star, targetPalace: target ? target.name : '(盤外)', targetDz: target ? target.dz : '' };
    }
    return result;
}

function detectSelfTrans(palace) {
    const sh = SIHUA[palace.gan];
    if (!sh) return [];
    const all = [...palace.stars.m, ...palace.stars.a, ...palace.stars.b];
    const res = [];
    for (const k of SH_KEYS) {
        if (all.includes(sh[k])) res.push({ type: k, star: sh[k] });
    }
    return res;
}
