<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a1a06"/>
      <stop offset="100%" stop-color="#0d0a05"/>
    </radialGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a5010"/>
      <stop offset="30%" stop-color="#d4a843"/>
      <stop offset="70%" stop-color="#c8932a"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a5010"/>
      <stop offset="30%" stop-color="#d4a843"/>
      <stop offset="70%" stop-color="#c8932a"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d2010"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </radialGradient>
    <radialGradient id="cornerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1408"/>
      <stop offset="100%" stop-color="#120c04"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#c8932a" stroke-width="1.5" opacity="0.15"/>

  <!-- Outer border -->
  <rect x="24" y="24" width="464" height="464" rx="72" fill="none" stroke="url(#goldH)" stroke-width="2" opacity="0.6"/>

  <!-- Grid boundary -->
  <rect x="64" y="64" width="384" height="384" rx="8" fill="none" stroke="url(#goldH)" stroke-width="1.5" opacity="0.8"/>

  <!-- Cell fills -->
  <rect x="65" y="65" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="193" y="65" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="321" y="65" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="65" y="193" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="193" y="193" width="126" height="126" rx="4" fill="url(#centerGlow)"/>
  <rect x="321" y="193" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="65" y="321" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="193" y="321" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>
  <rect x="321" y="321" width="126" height="126" rx="4" fill="url(#cornerGlow)"/>

  <!-- Grid lines -->
  <line x1="192" y1="64" x2="192" y2="448" stroke="url(#goldV)" stroke-width="1.5" opacity="0.7"/>
  <line x1="320" y1="64" x2="320" y2="448" stroke="url(#goldV)" stroke-width="1.5" opacity="0.7"/>
  <line x1="64" y1="192" x2="448" y2="192" stroke="url(#goldH)" stroke-width="1.5" opacity="0.7"/>
  <line x1="64" y1="320" x2="448" y2="320" stroke="url(#goldH)" stroke-width="1.5" opacity="0.7"/>

  <!-- Intersection dots -->
  <circle cx="192" cy="192" r="4" fill="#c8932a" opacity="0.8"/>
  <circle cx="320" cy="192" r="4" fill="#c8932a" opacity="0.8"/>
  <circle cx="192" cy="320" r="4" fill="#c8932a" opacity="0.8"/>
  <circle cx="320" cy="320" r="4" fill="#c8932a" opacity="0.8"/>

  <!-- TOP-LEFT: 天機 -->
  <text x="128" y="122" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">天</text>
  <text x="128" y="155" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">機</text>

  <!-- TOP-CENTER: 太陽 -->
  <text x="256" y="112" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="38" fill="#d4a020" opacity="0.95" filter="url(#glowSoft)">太</text>
  <text x="256" y="148" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="38" fill="#d4a020" opacity="0.95">陽</text>

  <!-- TOP-RIGHT: 武曲 -->
  <text x="384" y="122" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">武</text>
  <text x="384" y="155" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">曲</text>

  <!-- MID-LEFT: 天同 -->
  <text x="128" y="250" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">天</text>
  <text x="128" y="283" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">同</text>

  <!-- CENTER: 紫微 (main star) -->
  <circle cx="256" cy="248" r="56" fill="#6b0f1a" opacity="0.18"/>
  <circle cx="256" cy="248" r="40" fill="#8b1a1a" opacity="0.1"/>
  <text x="256" y="262" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="74" font-weight="900" fill="#e0192e" filter="url(#glow)" opacity="0.97">紫</text>
  <text x="256" y="306" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="30" font-weight="700" fill="#c8932a" opacity="0.9">微</text>
  <!-- center cell corner dots -->
  <circle cx="197" cy="197" r="2.5" fill="#c8932a" opacity="0.5"/>
  <circle cx="315" cy="197" r="2.5" fill="#c8932a" opacity="0.5"/>
  <circle cx="197" cy="315" r="2.5" fill="#c8932a" opacity="0.5"/>
  <circle cx="315" cy="315" r="2.5" fill="#c8932a" opacity="0.5"/>

  <!-- MID-RIGHT: 廉貞 -->
  <text x="384" y="250" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">廉</text>
  <text x="384" y="283" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">貞</text>

  <!-- BOTTOM-LEFT: 天府 -->
  <text x="128" y="378" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">天</text>
  <text x="128" y="411" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">府</text>

  <!-- BOTTOM-CENTER: 太陰 -->
  <text x="256" y="370" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="38" fill="#8ab4d4" opacity="0.9" filter="url(#glowSoft)">太</text>
  <text x="256" y="406" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="38" fill="#8ab4d4" opacity="0.9">陰</text>

  <!-- BOTTOM-RIGHT: 貪狼 -->
  <text x="384" y="378" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="42" fill="#c8932a" opacity="0.92" filter="url(#glowSoft)">貪</text>
  <text x="384" y="411" text-anchor="middle" font-family="'Noto Serif TC','STSong','SimSun',serif" font-size="18" fill="#8a6530" opacity="0.85">狼</text>

  <!-- Corner brackets -->
  <path d="M 44 44 L 44 72 M 44 44 L 72 44" stroke="#c8932a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 468 44 L 468 72 M 468 44 L 440 44" stroke="#c8932a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 44 468 L 44 440 M 44 468 L 72 468" stroke="#c8932a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 468 468 L 468 440 M 468 468 L 440 468" stroke="#c8932a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.65"/>
</svg>
